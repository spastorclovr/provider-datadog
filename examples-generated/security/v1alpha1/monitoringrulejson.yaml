apiVersion: security.upbound.io/v1alpha1
kind: MonitoringRuleJSON
metadata:
  annotations:
    meta.upbound.io/example-id: security/v1alpha1/monitoringrulejson
  labels:
    testing.upbound.io/example-name: security_rule_json
  name: security-rule-json
spec:
  forProvider:
    rule: |
      {
        "name": "High error rate security monitoring",
        "isEnabled": true,
        "type": "log_detection",
        "message": "High error rate detected in logs",
        "tags": ["env:prod", "security"],
        "cases": [
          {
            "name": "high case",
            "status": "high",
            "condition": "errors > 100 && warnings > 1000",
            "notifications": ["@security-team"]
          }
        ],
        "queries": [
          {
            "name": "errors",
            "query": "status:error",
            "aggregation": "count",
            "dataSource": "logs",
            "groupByFields": ["service", "env"]
          },
          {
            "name": "warnings",
            "query": "status:warning",
            "aggregation": "count",
            "dataSource": "logs",
            "groupByFields": ["service", "env"]
          }
        ],
        "options": {
          "evaluationWindow": 300,
          "keepAlive": 600,
          "maxSignalDuration": 900,
          "detectionMethod": "threshold"
        }
      }
