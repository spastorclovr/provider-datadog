apiVersion: csm.upbound.io/v1alpha1
kind: ThreatsAgentRule
metadata:
  annotations:
    meta.upbound.io/example-id: csm/v1alpha1/threatsagentrule
  labels:
    testing.upbound.io/example-name: my_agent_rule
  name: my-agent-rule
spec:
  forProvider:
    actions:
    - hash:
      - {}
      set:
      - append: false
        field: exec.file.path
        name: updated_security_actions
        scope: process
    description: This is a rule
    enabled: true
    expression: open.file.name == "etc/shadow/password"
    name: my_agent_rule
    policyId: jm4-lwh-8cs
    productTags:
    - compliance_framework:PCI-DSS
