    datadog_incident_notification_rule:
        subCategory: ""
        description: Provides a Datadog incident notification rule resource. This can be used to create and manage Datadog incident notification rules.
        name: datadog_incident_notification_rule
        title: datadog_incident_notification_rule Resource - terraform-provider-datadog
        examples:
            - name: example
              manifest: |-
                {
                  "conditions": [
                    {
                      "field": "severity",
                      "values": [
                        "SEV-1",
                        "SEV-2"
                      ]
                    },
                    {
                      "field": "services",
                      "values": [
                        "web-service",
                        "api-service",
                        "database-service"
                      ]
                    }
                  ],
                  "enabled": true,
                  "handles": [
                    "@team-email@company.com",
                    "@slack-channel-alerts",
                    "@pagerduty-service"
                  ],
                  "incident_type": "${datadog_incident_type.example.id}",
                  "notification_template": "${datadog_incident_notification_template.example.id}",
                  "renotify_on": [
                    "status",
                    "severity"
                  ],
                  "trigger": "incident_created_trigger",
                  "visibility": "organization"
                }
              references:
                incident_type: datadog_incident_type.example.id
                notification_template: datadog_incident_notification_template.example.id
              dependencies:
                datadog_incident_notification_template.example: |-
                    {
                      "category": "alert",
                      "content": "An incident has been declared.\n\nTitle: {{incident.title}}\nSeverity: {{incident.severity}}\nStatus: {{incident.status}}\n\nPlease join the incident channel for updates.\n",
                      "incident_type": "${datadog_incident_type.example.id}",
                      "name": "My Notification Template",
                      "subject": "SEV-1 Incident: {{incident.title}}"
                    }
                datadog_incident_type.example: |-
                    {
                      "description": "Incident type for critical production issues",
                      "name": "My Incident Type"
                    }
        argumentDocs:
            conditions: (Block List) The conditions that trigger this notification rule. At least one condition is required. (see below for nested schema)
            created: (String) Timestamp when the notification rule was created.
            enabled: (Boolean) Whether the notification rule is enabled. Defaults to false.
            field: '(String) The incident field to evaluate. Common values include: state, severity, services, teams. Custom fields are also supported.'
            handles: '(List of String) The notification handles (targets) for this rule. Examples: @team-email@company.com, @slack-channel.'
            id: (String) The ID of the incident notification rule.
            incident_type: (String) The ID of the incident type this notification rule is associated with.
            modified: (String) Timestamp when the notification rule was last modified.
            notification_template: (String) The ID of the notification template to use for this rule.
            renotify_on: '(List of String) List of incident fields that trigger re-notification when changed. Valid values are: status, severity, customer_impact, title, description, detected, root_cause, services, state.'
            trigger: '(String) The trigger event for this notification rule. Valid values are: incident_created_trigger, incident_saved_trigger.'
            values: (List of String) The value(s) to compare against. Multiple values are ORed together.
            visibility: '(String) The visibility of the notification rule. Valid values are: all, organization, private. Defaults to organization.'
        importStatements:
            - terraform import datadog_incident_notification_rule.example "00000000-0000-0000-0000-000000000000"
    datadog_incident_notification_template:
        subCategory: ""
        description: Provides a Datadog incident notification template resource. This can be used to create and manage Datadog incident notification templates.
        name: datadog_incident_notification_template
        title: datadog_incident_notification_template Resource - terraform-provider-datadog
        examples:
            - name: security_incident
              manifest: "{\n  \"category\": \"alert\",\n  \"content\": \"\U0001F6A8 SECURITY INCIDENT DECLARED \U0001F6A8\\n\\n**Incident Details:**\\n- Title: {{incident.title}}\\n- Severity: {{incident.severity}}\\n- Status: {{incident.status}}\\n- Declared at: {{incident.created}}\\n\\n**Affected Services:**\\n{{#each incident.services}}\\n- {{name}}\\n{{/each}}\\n\\n**Commander:** {{incident.commander}}\\n\\n**Next Steps:**\\n1. Join the incident Slack channel: #incident-{{incident.id}}\\n2. Review the incident details in Datadog\\n3. Await further instructions from the incident commander\\n\\nFor more information: {{incident.url}}\\n\",\n  \"incident_type\": \"${datadog_incident_type.security.id}\",\n  \"name\": \"Security Incident Template\",\n  \"subject\": \"SEV-1 Security Incident: {{incident.title}}\"\n}"
              references:
                incident_type: datadog_incident_type.security.id
              dependencies:
                datadog_incident_type.security: |-
                    {
                      "description": "Security-related incidents requiring immediate attention",
                      "name": "Security Incident"
                    }
        argumentDocs:
            category: (String) The category of the notification template. Valid values are alert, incident, recovery.
            content: (String) The content body of the notification template.
            created: (String) Timestamp when the notification template was created.
            id: (String) The ID of the incident notification template.
            incident_type: (String) The ID of the incident type this notification template is associated with.
            modified: (String) Timestamp when the notification template was last modified.
            name: (String) The name of the notification template.
            subject: (String) The subject line of the notification template.
        importStatements:
            - |-
              #!/bin/bash

              # Import an existing incident notification template
              terraform import datadog_incident_notification_template.security_incident 11111111-2222-3333-4444-555555555555
    datadog_incident_type:
        subCategory: ""
        description: Provides a Datadog incident type resource. This can be used to create and manage Datadog incident types.
        name: datadog_incident_type
        title: datadog_incident_type Resource - terraform-provider-datadog
        examples:
            - name: example
              manifest: |-
                {
                  "description": "Security-related incidents requiring immediate attention",
                  "is_default": false,
                  "name": "Security Incident"
                }
        argumentDocs:
            description: (String) Description of the incident type. The description can have a maximum of 512 characters.
            id: (String) The ID of the incident type.
            is_default: (Boolean) Whether this incident type is the default type.
            name: (String) Name of the incident type. Must be between 1 and 50 characters.
        importStatements:
            - terraform import datadog_incident_type.example "12345678-1234-1234-1234-1234567890ab"
    datadog_integration_aws:
        subCategory: ""
        description: '!>This resource is deprecated - use the datadog_integration_aws_account resource instead. Provides a Datadog - Amazon Web Services integration resource. This can be used to create and manage Datadog - Amazon Web Services integration.'
        name: datadog_integration_aws
        title: datadog_integration_aws Resource - terraform-provider-datadog
        examples:
            - name: sandbox
              manifest: |-
                {
                  "account_id": "1234567890",
                  "account_specific_namespace_rules": {
                    "auto_scaling": false,
                    "opsworks": false
                  },
                  "excluded_regions": [
                    "us-east-1",
                    "us-west-2"
                  ],
                  "filter_tags": [
                    "key:value"
                  ],
                  "host_tags": [
                    "key:value",
                    "key2:value2"
                  ],
                  "role_name": "DatadogAWSIntegrationRole"
                }
        argumentDocs:
            access_key_id: (String) Your AWS access key ID. Only required if your AWS account is a GovCloud or China account.
            account_id: (String) Your AWS Account ID without dashes.
            account_specific_namespace_rules: (Map of Boolean) Enables or disables metric collection for specific AWS namespaces for this AWS account only. A list of namespaces can be found at the available namespace rules API endpoint.
            cspm_resource_collection_enabled: (String) Whether Datadog collects cloud security posture management resources from your AWS account. This includes additional resources not covered under the general resource_collection.
            excluded_regions: (Set of String) An array of AWS regions to exclude from metrics collection.
            extended_resource_collection_enabled: (String) Whether Datadog collects additional attributes and configuration information about the resources in your AWS account. Required for cspm_resource_collection_enabled.
            external_id: (String) AWS External ID. NOTE This provider will not be able to detect changes made to the external_id field from outside Terraform.
            filter_tags: (List of String) Array of EC2 tags (in the form key:value) defines a filter that Datadog uses when collecting metrics from EC2. Wildcards, such as ? (for single characters) and * (for multiple characters) can also be used. Only hosts that match one of the defined tags will be imported into Datadog. The rest will be ignored. Host matching a given tag can also be excluded by adding ! before the tag. e.x. env:production,instance-type:c1.*,!region:us-east-1.
            host_tags: (List of String) Array of tags (in the form key:value) to add to all hosts and metrics reporting through this integration.
            id: (String) The ID of this resource.
            metrics_collection_enabled: (String) Whether Datadog collects metrics for this AWS account.
            resource_collection_enabled: (String, Deprecated) Whether Datadog collects a standard set of resources from your AWS account. Deprecated. Deprecated in favor of extended_resource_collection_enabled.
            role_name: (String) Your Datadog role delegation name.
            secret_access_key: (String, Sensitive) Your AWS secret access key. Only required if your AWS account is a GovCloud or China account.
        importStatements:
            - |-
              # Amazon Web Services integrations can be imported using their account ID and role name separated with a colon (:), while the external_id should be passed by setting an environment variable called EXTERNAL_ID
              EXTERNAL_ID=${external_id} terraform import datadog_integration_aws.test ${account_id}:${role_name}
    datadog_integration_aws_account:
        subCategory: ""
        description: Provides a Datadog - Amazon Web Services integration resource. This can be used to create and manage Datadog - Amazon Web Services integration.
        name: datadog_integration_aws_account
        title: datadog_integration_aws_account Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "account_tags": [
                    "env:prod"
                  ],
                  "auth_config": [
                    {
                      "aws_auth_config_role": [
                        {
                          "role_name": "DatadogIntegrationRole"
                        }
                      ]
                    }
                  ],
                  "aws_account_id": "123456789012",
                  "aws_partition": "aws",
                  "aws_regions": [
                    {
                      "include_all": true
                    }
                  ],
                  "logs_config": [
                    {
                      "lambda_forwarder": [
                        {
                          "lambdas": [
                            "arn:aws:lambda:us-east-1:123456789012:function:my-lambda"
                          ],
                          "log_source_config": [
                            {
                              "tag_filters": [
                                {
                                  "source": "s3",
                                  "tags": [
                                    "env:prod",
                                    "team:backend"
                                  ]
                                }
                              ]
                            }
                          ],
                          "sources": [
                            "s3"
                          ]
                        }
                      ]
                    }
                  ],
                  "metrics_config": [
                    {
                      "automute_enabled": true,
                      "collect_cloudwatch_alarms": true,
                      "collect_custom_metrics": true,
                      "enabled": true,
                      "namespace_filters": [
                        {
                          "exclude_only": [
                            "AWS/SQS",
                            "AWS/ElasticMapReduce",
                            "AWS/Usage"
                          ]
                        }
                      ],
                      "tag_filters": [
                        {
                          "namespace": "AWS/EC2",
                          "tags": [
                            "datadog:true"
                          ]
                        }
                      ]
                    }
                  ],
                  "resources_config": [
                    {
                      "cloud_security_posture_management_collection": true,
                      "extended_collection": true
                    }
                  ],
                  "traces_config": [
                    {
                      "xray_services": [
                        {
                          "include_all": true
                        }
                      ]
                    }
                  ]
                }
            - name: foo-defaults
              manifest: |-
                {
                  "auth_config": [
                    {
                      "aws_auth_config_role": [
                        {
                          "role_name": "DatadogIntegrationRole"
                        }
                      ]
                    }
                  ],
                  "aws_account_id": "234567890123",
                  "aws_partition": "aws",
                  "aws_regions": [
                    {}
                  ],
                  "logs_config": [
                    {
                      "lambda_forwarder": [
                        {}
                      ]
                    }
                  ],
                  "metrics_config": [
                    {
                      "namespace_filters": [
                        {}
                      ]
                    }
                  ],
                  "resources_config": [
                    {}
                  ],
                  "traces_config": [
                    {
                      "xray_services": [
                        {}
                      ]
                    }
                  ]
                }
        argumentDocs:
            access_key_id: (String) AWS Access Key ID
            account_tags: (List of String) Tags to apply to all metrics in the account. Defaults to [].
            auth_config: (Block) Configure how Datadog authenticates to your AWS account. Either aws_auth_config_keys or aws_auth_config_role block is required within. (see below for nested schema)
            automute_enabled: (Boolean) Enable EC2 automute for AWS metrics Defaults to true.
            aws_account_id: (String) Your AWS Account ID without dashes.
            aws_auth_config_keys: (Block, Optional) (see below for nested schema)
            aws_auth_config_role: (Block, Optional) (see below for nested schema)
            aws_partition: (String) AWS Account partition.
            aws_regions: (Block) AWS regions to collect data from. Defaults to include_all if block is empty. (see below for nested schema)
            cloud_security_posture_management_collection: (Boolean) Enable Cloud Security Management to scan AWS resources for vulnerabilities, misconfigurations, identity risks, and compliance violations. Requires extended_collection to be set to true. Defaults to false.
            collect_cloudwatch_alarms: (Boolean) Enable CloudWatch alarms collection Defaults to false.
            collect_custom_metrics: (Boolean) Enable custom metrics collection Defaults to false.
            enabled: (Boolean) Enable AWS metrics collection Defaults to true.
            exclude_only: (List of String) Exclude only these namespaces from metrics collection. Use datadog_integration_aws_available_namespaces data source to get allowed values. Defaults to ["AWS/SQS", "AWS/ElasticMapReduce", "AWS/Usage"]. AWS/SQS, AWS/ElasticMapReduce, and AWS/Usage are excluded by default to reduce your AWS CloudWatch costs from GetMetricData API calls.
            extended_collection: (Boolean) Whether Datadog collects additional attributes and configuration information about the resources in your AWS account. Required for cloud_security_posture_management_collection. Defaults to true.
            external_id: (String) AWS IAM external ID for associated role. If omitted, one is generated.
            id: (String) The ID of this resource.
            include_all: (Boolean) Include all regions. Defaults to true.
            include_only: (List of String) Include only these regions.
            lambda_forwarder: (Block) Leave empty to omit logs config. (see below for nested schema)
            lambdas: (List of String) List of Datadog Lambda Log Forwarder ARNs in your AWS account. Defaults to [].
            log_source_config: (Block, Optional) Configure log source collection for your Datadog Forwarder Lambda functions. (see below for nested schema)
            logs_config: (Block) Configure log autosubscription for your Datadog Forwarder Lambda functions. The lambda_forwarder block is required within, but may be empty to use defaults. (see below for nested schema)
            metrics_config: (Block) Configure metrics collection from AWS CloudWatch. The namespace_filters block is required within, but may be empty to use defaults. (see below for nested schema)
            namespace: (String) The AWS service for which the tag filters defined in tags will be applied.
            namespace_filters: (Block) AWS metrics namespace filters. Defaults to a pre-set exclude_only list if block is empty. (see below for nested schema)
            resources_config: (Block) AWS resources collection config. May be empty to use defaults. (see below for nested schema)
            role_name: (String) AWS IAM role name.
            secret_access_key: (String, Sensitive) AWS Secret Access Key. This value is write-only; changes made outside of Terraform will not be drift-detected.
            source: (String) The AWS service for which the tag filters defined in tags will be applied.
            sources: (List of String) List of service IDs set to enable automatic log collection. Use datadog_integration_aws_available_logs_services data source or the AWS Logs Integration API to get allowed values. Defaults to [].
            tag_filters: (Block List) AWS Logs Collection tag filters list. (see below for nested schema)
            tags: (List of String) The AWS resource tags to filter on for the service specified by source.
            traces_config: (Block) AWS traces collection config. The xray_services block is required within, but may be empty to use defaults. (see below for nested schema)
            xray_services: (Block) AWS X-Ray services to collect traces from. Defaults to include_only. (see below for nested schema)
        importStatements:
            - terraform import datadog_integration_aws_account.example "<datadog-aws-account-config-id>"
    datadog_integration_aws_event_bridge:
        subCategory: ""
        description: Provides a Datadog - Amazon Web Services integration EventBridge resource. This can be used to create and manage Event Sources for each Datadog integrated AWS account.
        name: datadog_integration_aws_event_bridge
        title: datadog_integration_aws_event_bridge Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "account_id": "123456789012",
                  "create_event_bus": true,
                  "event_generator_name": "app-alerts",
                  "region": "us-east-1"
                }
        argumentDocs:
            account_id: (String) Your AWS Account ID without dashes.
            create_event_bus: (Boolean) True if Datadog should create the event bus in addition to the event source. Requires the events:CreateEventBus permission. Defaults to true.
            event_generator_name: (String) The given part of the event source name, which is then combined with an assigned suffix to form the full name.
            id: (String) The ID of this resource.
            region: (String) The event source's AWS region.
        importStatements:
            - |-
              # Amazon Web Service EventBridge integrations are imported using the Event Source name as listed for an integrated AWS account in Datadog
              terraform import datadog_integration_aws_event_bridge.foo event-source-name-abc12345
    datadog_integration_aws_external_id:
        subCategory: ""
        description: '!>A new external ID must be used to create an AWS account integration in Datadog within 48 hours of creation or it will expire. !>Running terraform destroy only removes the resource from Terraform state and does not deactivate anything in Datadog or AWS. Provides a Datadog-Amazon Web Services external ID resource. This can be used to create Datadog-Amazon Web Services external IDs This resource can be used in conjunction with the datadog_integration_aws_account https://registry.terraform.io/providers/DataDog/datadog/latest/docs/resources/integration_aws_account resource. The external ID value can be referenced as shown:'
        name: datadog_integration_aws_external_id
        title: datadog_integration_aws_external_id Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: '{}'
              dependencies:
                datadog_integration_aws_account.foo-defaults: |-
                    {
                      "auth_config": [
                        {
                          "aws_auth_config_role": [
                            {
                              "external_id": "${datadog_integration_aws_external_id.foo.id}",
                              "role_name": "DatadogIntegrationRole"
                            }
                          ]
                        }
                      ],
                      "aws_account_id": "123456789019",
                      "aws_partition": "aws"
                    }
            - name: foo
              manifest: '{}'
        argumentDocs:
            id: (String) The external ID.
        importStatements:
            - terraform apply -replace="datadog_integration_aws_external_id.foo"
            - |-
              # Amazon Web Services external IDs can be imported using the ID value.
              terraform import datadog_integration_aws_external_id.foo ${id}
    datadog_integration_aws_lambda_arn:
        subCategory: ""
        description: '!>This resource is deprecated - use the datadog_integration_aws_account resource instead. Provides a Datadog - Amazon Web Services integration Lambda ARN resource. This can be used to create and manage the log collection Lambdas for an account. Update operations are currently not supported with datadog API so any change forces a new resource. Note: If you are using AWS GovCloud or the AWS China* region, update the lambda_arn parameter for your environment. *All use of Datadog Services in (or in connection with environments within) mainland China is subject to the disclaimer published in the Restricted Service Locations section on our website.'
        name: datadog_integration_aws_lambda_arn
        title: datadog_integration_aws_lambda_arn Resource - terraform-provider-datadog
        examples:
            - name: main_collector
              manifest: |-
                {
                  "account_id": "1234567890",
                  "lambda_arn": "arn:aws:lambda:us-east-1:1234567890:function:datadog-forwarder-Forwarder"
                }
        argumentDocs:
            account_id: (String) Your AWS Account ID without dashes.
            id: (String) The ID of this resource.
            lambda_arn: (String) The ARN of the Datadog forwarder Lambda.
        importStatements:
            - |-
              # Amazon Web Services Lambda ARN integrations can be imported using their account_id and lambda_arn separated with a space (` `).
              terraform import datadog_integration_aws_lambda_arn.test "1234567890 arn:aws:lambda:us-east-1:1234567890:function:datadog-forwarder-Forwarder"
    datadog_integration_aws_log_collection:
