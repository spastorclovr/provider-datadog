            override_ui_defined_resources: (Boolean) Whether to override UI-defined rulesets. When set to true, any rulesets created via the UI that are not defined in Terraform will be deleted and Terraform will be used as the source of truth for rules and their ordering. When set to false, any rulesets created via the UI that are at the end of order will be kept but will be warned, otherwise an error will be thrown in terraform plan phase. Default is false
            ruleset_ids: (List of String) The list of Tag Pipeline Ruleset IDs, in order. Rulesets are executed in the order specified in this list.
        importStatements:
            - terraform import datadog_tag_pipeline_rulesets.my_rulesets order
