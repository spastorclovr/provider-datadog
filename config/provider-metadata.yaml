name: DataDog/datadog
resources:
    datadog_action_connection:
        subCategory: ""
        description: A connection that can be used in Actions, including in the Workflow Automation and App Builder products. This resource requires a registered application key https://registry.terraform.io/providers/DataDog/datadog/latest/docs/resources/app_key_registration.
        name: datadog_action_connection
        title: datadog_action_connection Resource - terraform-provider-datadog
        examples:
            - name: aws_connection
              manifest: |-
                {
                  "aws": [
                    {
                      "assume_role": [
                        {
                          "account_id": "123456789012",
                          "role": "role2"
                        }
                      ]
                    }
                  ],
                  "name": "My AWS Connection"
                }
            - name: http_connection
              manifest: |-
                {
                  "http": [
                    {
                      "base_url": "https://catfact.ninja",
                      "token_auth": [
                        {
                          "body": [
                            {
                              "content": "${jsonencode({\n          key   = \"mykey\"\n          value = \"maybe with a secret: {{ token2 }}\"\n        })}",
                              "content_type": "application/json"
                            }
                          ],
                          "header": [
                            {
                              "name": "header-one",
                              "value": "headerval"
                            },
                            {
                              "name": "h2",
                              "value": "{{ token1 }} test"
                            }
                          ],
                          "token": [
                            {
                              "name": "token1",
                              "type": "SECRET",
                              "value": "${var.token1}"
                            },
                            {
                              "name": "token2",
                              "type": "SECRET",
                              "value": "${var.token2}"
                            }
                          ],
                          "url_parameter": [
                            {
                              "name": "param1",
                              "value": "{{ token1 }}"
                            },
                            {
                              "name": "param2",
                              "value": "paramVal2"
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "name": "My HTTP connection with token auth"
                }
              references:
                http.token_auth.token.value: var.token2
        argumentDocs:
            account_id: (String) AWS account that the connection is created for. String length must be at least 1.
            assume_role: (Block, Optional) Configuration for an assume role AWS connection (see below for nested schema)
            aws: (Block, Optional) Configuration for an AWS connection (see below for nested schema)
            base_url: (String) Base HTTP url for the integration. String length must be at least 1.
            body: (Block, Optional) Body for HTTP authentication (see below for nested schema)
            content: (String) Serialized body content. String length must be at least 1.
            content_type: (String) Content type of the body. String length must be at least 1.
            external_id: (String) External ID that specifies which connection can be used to assume the role
            header: (Block List) Header for HTTP authentication (see below for nested schema)
            http: (Block, Optional) Configuration for an HTTP connection (see below for nested schema)
            id: (String) The ID of this resource.
            name: (String) Name of the connection
            principal_id: (String) AWS account that will assume the role
            role: (String) Role to assume. String length must be at least 1.
            token: (Block List) Token for HTTP authentication (see below for nested schema)
            token_auth: (Block, Optional) Configuration for an HTTP connection that uses token auth (see below for nested schema)
            type: (String) Token type Valid values are SECRET.
            url_parameter: (Block List) URL parameter for HTTP authentication (see below for nested schema)
            value: (String) String length must be at least 1.
        importStatements:
            - terraform import datadog_action_connection.my_connection 11111111-2222-3333-4444-555555555555
    datadog_agentless_scanning_aws_scan_options:
        subCategory: ""
        description: Provides a Datadog Agentless Scanning AWS scan options resource. This can be used to activate and configure Agentless scan options for an AWS account.
        name: datadog_agentless_scanning_aws_scan_options
        title: datadog_agentless_scanning_aws_scan_options Resource - terraform-provider-datadog
        examples:
            - name: example
              manifest: |-
                {
                  "aws_account_id": "123456789012",
                  "lambda": true,
                  "sensitive_data": false,
                  "vuln_containers_os": true,
                  "vuln_host_os": true
                }
        argumentDocs:
            aws_account_id: (String) The AWS account ID for which agentless scanning is configured. Must be a valid AWS account ID.
            id: (String) The ID of this resource.
            lambda: (Boolean) Indicates if scanning of Lambda functions is enabled.
            sensitive_data: (Boolean) Indicates if scanning for sensitive data is enabled.
            vuln_containers_os: (Boolean) Indicates if scanning for vulnerabilities in containers is enabled.
            vuln_host_os: (Boolean) Indicates if scanning for vulnerabilities in hosts is enabled.
        importStatements:
            - |-
              #!/bin/sh

              # Import existing agentless scanning AWS scan options by AWS account ID
              terraform import datadog_agentless_scanning_aws_scan_options.example 123456789012
    datadog_agentless_scanning_gcp_scan_options:
        subCategory: ""
        description: Provides a Datadog Agentless Scanning GCP scan options resource. This can be used to activate and configure Agentless scan options for a GCP project.
        name: datadog_agentless_scanning_gcp_scan_options
        title: datadog_agentless_scanning_gcp_scan_options Resource - terraform-provider-datadog
        examples:
            - name: example
              manifest: |-
                {
                  "gcp_project_id": "company-project-prod",
                  "vuln_containers_os": true,
                  "vuln_host_os": true
                }
        argumentDocs:
            gcp_project_id: '(String) The GCP project ID for which agentless scanning is configured. Must be a valid GCP project ID: 6–30 characters, start with a lowercase letter, and include only lowercase letters, digits, or hyphens.'
            id: (String) The ID of this resource.
            vuln_containers_os: (Boolean) Indicates if scanning for vulnerabilities in containers is enabled.
            vuln_host_os: (Boolean) Indicates if scanning for vulnerabilities in hosts is enabled.
        importStatements:
            - |-
              #!/bin/sh

              # Import existing agentless scanning GCP scan options by GCP project ID
              terraform import datadog_agentless_scanning_gcp_scan_options.example company-project-prod
    datadog_api_key:
        subCategory: ""
        description: Provides a Datadog API Key resource. This can be used to create and manage Datadog API Keys. Import functionality for this resource is deprecated and will be removed in a future release with prior notice. Securely store your API keys using a secret management system or use this resource to create and manage new API keys.
        name: datadog_api_key
        title: datadog_api_key Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "name": "foo-application"
                }
        argumentDocs:
            id: (String) The ID of this resource.
            key: (String, Sensitive) The value of the API Key.
            name: (String) Name for API Key.
            remote_config_read_enabled: (Boolean) Whether the API key is used for remote config. Set to true only if remote config is enabled in /organization-settings/remote-config.
        importStatements:
            - terraform import datadog_api_key.foo 11111111-2222-3333-4444-555555555555
    datadog_apm_retention_filter:
        subCategory: ""
        description: The object describing the configuration of the retention filter to create/update.
        name: datadog_apm_retention_filter
        title: datadog_apm_retention_filter Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "enabled": false,
                  "filter": [
                    {
                      "query": "service:sample AND env:production AND @http.method:GET AND app:sampleapp AND @http.status_code:200 AND @duration:\u003e600000000"
                    }
                  ],
                  "filter_type": "spans-sampling-processor",
                  "name": "Sample order",
                  "rate": "1.0"
                }
        argumentDocs:
            enabled: (Boolean) the status of the retention filter.
            filter: (Block, Optional) The spans filter. Spans matching this filter will be indexed and stored. (see below for nested schema)
            filter_type: (String) The type of the retention filter, currently only spans-processing-sampling is available. Valid values are spans-sampling-processor.
            id: (String) The ID of this resource.
            name: (String) The name of the retention filter.
            query: (String) The search query - follow the span search syntax, use AND between tags and \ to escape special characters, use nanosecond for duration. Defaults to "*".
            rate: (String) Sample rate to apply to spans going through this retention filter as a string; a value of 1.0 keeps all spans matching the query. Value must be between 0.00 and 1.00.
            trace_rate: (String) Sample rate to apply to traces with spans going through this retention filter as a string; a value of 1.0 keeps all traces matching the query. Value must be between 0.00 and 1.00.
        importStatements:
            - "# Import existing APM retention filter \nterraform import datadog_apm_retention_filter.foo <filter_id>"
    datadog_apm_retention_filter_order:
        subCategory: ""
        description: Provides a Datadog APM Retention Filters API https://docs.datadoghq.com/api/v2/apm-retention-filters/ resource, which is used to manage Datadog APM retention filters order.
        name: datadog_apm_retention_filter_order
        title: datadog_apm_retention_filter_order Resource - terraform-provider-datadog
        examples:
            - name: bar
              manifest: |-
                {
                  "filter_ids": [
                    "${datadog_apm_retention_filter.foo.id}"
                  ]
                }
              dependencies:
                datadog_apm_retention_filter.foo: |-
                    {
                      "enabled": false,
                      "filter": [
                        {
                          "query": "*"
                        }
                      ],
                      "filter_type": "spans-sampling-processor",
                      "name": "Sample order",
                      "rate": "1.0"
                    }
        argumentDocs:
            filter_ids: (List of String) The filter IDs list. The order of filters IDs in this attribute defines the overall APM retention filters order.
            id: (String) The ID of this resource.
        importStatements:
            - |-
              # Import existing APM retention filter order
              # Note: Value of <foo> can be anything as this id is not stored by the resource
              terraform import datadog_apm_retention_filter_order.bar <foo>
    datadog_app_builder_app:
        subCategory: ""
        description: Provides a Datadog App resource for creating and managing Datadog Apps from App Builder using the JSON definition. To easily export an App for use with Terraform, use the export button in the Datadog App Builder UI. This resource requires a registered application key https://registry.terraform.io/providers/DataDog/datadog/latest/docs/resources/app_key_registration.
        name: datadog_app_builder_app
        title: datadog_app_builder_app Resource - terraform-provider-datadog
        examples:
            - name: example_app_from_file
              manifest: |-
                {
                  "action_query_names_to_connection_ids": {
                    "listTeams0": "${var.connection_id}"
                  },
                  "app_json": "${file(\"${path.module}/resource.json\")}"
                }
            - name: example_app_inline_optional
              manifest: |-
                {
                  "action_query_names_to_connection_ids": {
                    "listTeams0": "${var.connection_id}"
                  },
                  "app_json": "${jsonencode(\n    {\n      \"queries\" : [\n        {\n          \"id\" : \"11111111-1111-1111-1111-111111111111\",\n          \"type\" : \"action\",\n          \"name\" : \"listTeams0\",\n          \"events\" : [],\n          \"properties\" : {\n            \"spec\" : {\n              \"fqn\" : \"com.datadoghq.dd.teams.listTeams\",\n              \"connectionId\" : \"11111111-1111-1111-1111-111111111111\",\n              \"inputs\" : {}\n            }\n          }\n        }\n      ],\n      \"id\" : \"11111111-2222-3333-4444-555555555555\",\n      \"components\" : [\n        {\n          \"events\" : [],\n          \"name\" : \"grid0\",\n          \"properties\" : {\n            \"children\" : []\n          },\n          \"type\" : \"grid\"\n        }\n      ],\n      \"description\" : \"This description will be overridden\",\n      \"favorite\" : false,\n      \"name\" : \"This name will be overridden\",\n      \"rootInstanceName\" : \"This rootInstanceName will be overridden\",\n      \"selfService\" : false,\n      \"tags\" : [],\n      \"connections\" : [\n        {\n          \"id\" : \"11111111-1111-1111-1111-111111111111\",\n          \"name\" : \"A connection that will be overridden\"\n        }\n      ],\n      \"deployment\" : {\n        \"id\" : \"11111111-1111-1111-1111-111111111111\",\n        \"app_version_id\" : \"00000000-0000-0000-0000-000000000000\"\n      }\n    }\n  )}",
                  "description": "Created using the Datadog provider in Terraform.",
                  "name": "Example Terraform App - Inline - Optional",
                  "published": false,
                  "root_instance_name": "grid0"
                }
            - name: example_app_escaped_interpolated
              manifest: |-
                {
                  "app_json": "${jsonencode(\n    {\n      \"queries\" : [\n        {\n          \"id\" : \"11111111-1111-1111-1111-111111111111\",\n          \"name\" : \"listTeams0\",\n          \"type\" : \"action\",\n          \"properties\" : {\n            \"onlyTriggerManually\" : false,\n            \"outputs\" : \"$${((outputs) =\u003e {// Use 'outputs' to reference the query's unformatted output.\\n\\n// TODO: Apply transformations to the raw query output\\n\\nreturn outputs.data.map(item =\u003e item.attributes.name);})(self.rawOutputs)}\",\n            \"spec\" : {\n              \"fqn\" : \"com.datadoghq.dd.teams.listTeams\",\n              \"inputs\" : {},\n              \"connectionId\" : \"${var.connection_id}\"\n            }\n          }\n        }\n      ],\n      \"id\" : \"11111111-2222-3333-4444-555555555555\",\n      \"components\" : [\n        {\n          \"events\" : [],\n          \"name\" : \"grid0\",\n          \"properties\" : {\n            \"children\" : []\n          },\n          \"type\" : \"grid\"\n        }\n      ],\n      \"description\" : \"${var.description}\",\n      \"favorite\" : false,\n      \"name\" : \"${var.name}\",\n      \"rootInstanceName\" : \"${var.root_instance_name}\",\n      \"selfService\" : false,\n      \"tags\" : [],\n      \"connections\" : [\n        {\n          \"id\" : \"${var.connection_id}\",\n          \"name\" : \"A connection that will be overridden\"\n        }\n      ],\n      \"deployment\" : {\n        \"id\" : \"11111111-1111-1111-1111-111111111111\",\n        \"app_version_id\" : \"00000000-0000-0000-0000-000000000000\"\n      }\n    }\n  )}"
                }
        argumentDocs:
            action_query_names_to_connection_ids: (Map of String) If specified, this will override the Action Connection IDs for the specified Action Query Names in the App JSON. Otherwise, a map of the App's Action Query Names to Action Connection IDs will be returned in output.
            app_json: (String) The JSON representation of the App. String length must be at least 1.
            description: (String) If specified, this will override the human-readable description of the App in the App JSON. String length must be at least 1.
            id: (String) The ID of this resource.
            name: (String) If specified, this will override the name of the App in the App JSON. String length must be at least 1.
            published: (Boolean) Set the app to published or unpublished. Published apps are available to other users. To ensure the app is accessible to the correct users, you also need to set a Restriction Policy on the app if a policy does not yet exist. Defaults to false.
            root_instance_name: (String) The name of the root component of the app. This must be a grid component that contains all other components. If specified, this will override the root instance name of the App in the App JSON. String length must be at least 1.
        importStatements:
            - terraform import datadog_app_builder_app.my_app 11111111-2222-3333-4444-555555555555
    datadog_app_key_registration:
        subCategory: ""
        description: Registers App Keys to be used for Action Connection, App Builder, and Workflow Automation. This registration is required to enable API and Terraform use in these products.
        name: datadog_app_key_registration
        title: datadog_app_key_registration Resource - terraform-provider-datadog
        examples:
            - name: app_key_registration
              manifest: |-
                {
                  "id": "11111111-2222-3333-4444-555555555555"
                }
        argumentDocs:
            id: (String) The Application Key ID to register.
        importStatements:
            - terraform import datadog_app_key_registration.my_app_key_registration 11111111-2222-3333-4444-555555555555
    datadog_application_key:
        subCategory: ""
        description: Provides a Datadog Application Key resource. This can be used to create and manage Datadog Application Keys. Import functionality for this resource is deprecated and will be removed in a future release with prior notice. Securely store your application keys using a secret management system or use this resource to create and manage new application keys.
        name: datadog_application_key
        title: datadog_application_key Resource - terraform-provider-datadog
        examples:
            - name: unrestricted_key
              manifest: |-
                {
                  "name": "Unrestricted Application Key"
                }
            - name: monitor_management_key
              manifest: |-
                {
                  "name": "Monitor Management Key",
                  "scopes": [
                    "monitors_read",
                    "monitors_write"
                  ]
                }
        argumentDocs:
            id: (String) The ID of this resource.
            key: (String, Sensitive) The value of the Application Key.
            name: (String) Name for Application Key.
            scopes: (Set of String) Authorization scopes for the Application Key. Application Keys configured with no scopes have full access.
        importStatements:
            - terraform import datadog_application_key.foo 11111111-2222-3333-4444-555555555555
    datadog_appsec_waf_custom_rule:
        subCategory: ""
        description: Provides a Datadog AppsecWafCustomRule resource. This can be used to create and manage Datadog appsec_waf_custom_rule.
        name: datadog_appsec_waf_custom_rule
        title: datadog_appsec_waf_custom_rule Resource - terraform-provider-datadog
        examples:
            - name: ioc000
              manifest: |-
                {
                  "action": [
                    {
                      "action": "redirect_request",
                      "parameters": [
                        {
                          "location": "/blocking",
                          "status_code": 302
                        }
                      ]
                    }
                  ],
                  "blocking": true,
                  "condition": [
                    {
                      "operator": "match_regex",
                      "parameters": [
                        {
                          "input": [
                            {
                              "address": "server.db.statement"
                            }
                          ],
                          "regex": "stmt.*"
                        }
                      ]
                    }
                  ],
                  "enabled": true,
                  "name": "Block requests from a bad actor",
                  "path_glob": "/db/*",
                  "tags": {
                    "category": "attack_attempt",
                    "type": "custom_ioc"
                  }
                }
            - name: biz000
              manifest: |-
                {
                  "blocking": false,
                  "condition": [
                    {
                      "operator": "capture_data",
                      "parameters": [
                        {
                          "input": [
                            {
                              "address": "server.request.query",
                              "key_path": [
                                "payment_id"
                              ]
                            }
                          ],
                          "value": "payment"
                        }
                      ]
                    }
                  ],
                  "enabled": true,
                  "name": "Track payments",
                  "path_glob": "/cart/*",
                  "scope": [
                    {
                      "env": "prod",
                      "service": "paymentsvc"
                    }
                  ],
                  "tags": {
                    "category": "business_logic",
                    "type": "payment.checkout"
                  }
                }
        argumentDocs:
            action: (Block, Optional) (see below for nested schema)
            address: (String) Input from the request on which the condition should apply.
            blocking: (Boolean) Indicates whether the WAF custom rule will block the request.
            case_sensitive: (Boolean) Evaluate the value as case sensitive.
            condition: (Block List) (see below for nested schema)
            data: (String) Identifier of a list of data from the denylist. Can only be used as substitution from the list parameter.
            enabled: (Boolean) Indicates whether the WAF custom rule is enabled.
            env: (String) The environment scope for the WAF custom rule.
            id: (String) The ID of this resource.
            input: (Block List) (see below for nested schema)
            key_path: (List of String) Specific path for the input.
            list: (List of String) List of value to use with the condition. Only used with the phrase_match, !phrase_match, exact_match and !exact_match operator.
            location: (String) The location to redirect to when the WAF custom rule triggers.
            min_length: (Number) Only evaluate this condition if the value has a minimum amount of characters.
            name: (String) The Name of the WAF custom rule.
            operator: (String) Operator to use for the WAF Condition.
            options: (Block, Optional) (see below for nested schema)
            parameters: (Block, Optional) (see below for nested schema)
            path_glob: (String) The path glob for the WAF custom rule.
            regex: (String) Regex to use with the condition. Only used with match_regex and !match_regex operator.
            scope: (Block List) (see below for nested schema)
            service: (String) The service scope for the WAF custom rule.
            status_code: (Number) The status code to return when the WAF custom rule triggers.
            tags: (Map of String) Tags associated with the WAF custom rule. category and type tags are required. Supported categories include business_logic, attack_attempt and security_response.
            value: (String) Store the captured value in the specified tag name. Only used with the capture_data operator.
        importStatements:
            - terraform import datadog_appsec_waf_custom_rule.new_list ""
    datadog_appsec_waf_exclusion_filter Resource - terraform-provider-datadog:
        subCategory: ""
        description: Provides a Datadog AppsecWafExclusionFilter resource. This can be used to create and manage Datadog appsec_waf_exclusion_filter.
        name: datadog_appsec_waf_exclusion_filter Resource - terraform-provider-datadog
        title: datadog_appsec_waf_exclusion_filter Resource - terraform-provider-datadog
        argumentDocs:
            category: (String) The category of the targeted WAF rules.
            description: (String) A description for the exclusion filter.
            enabled: (Boolean) Indicates whether the exclusion filter is enabled.
            env: (String) Deploy on this environment.
            event_query: (String) The event query matched by the legacy exclusion filter. Cannot be created nor updated.
            id: (String) The ID of this resource.
            ip_list: (List of String) The client IP addresses matched by the exclusion filter (CIDR notation is supported).
            on_match: (String) The action taken when the exclusion filter matches. When set to monitor, security traces are emitted but the requests are not blocked. By default, security traces are not emitted and the requests are not blocked.
            parameters: (List of String) A list of parameters matched by the exclusion filter in the HTTP query string and HTTP request body. Nested parameters can be matched by joining fields with a dot character.
            path_glob: (String) The HTTP path glob expression matched by the exclusion filter.
            rule_id: (String) Target a single WAF rule based on its identifier.
            rules_target: (Block List) (see below for nested schema)
            scope: (Block List) (see below for nested schema)
            service: (String) Deploy on this service.
            tags: (Block, Optional) (see below for nested schema)
            type: (String) The type of the targeted WAF rules.
        importStatements:
            - terraform import datadog_appsec_exclusion_filter.passlist_entry "45b7032f-0ac4-4b2f-9118-363523c625f6"
    datadog_authn_mapping:
        subCategory: ""
        description: Provides a Datadog AuthN Mappings resource. This feature lets you automatically assign roles to users based on their SAML attributes.
        name: datadog_authn_mapping
        title: datadog_authn_mapping Resource - terraform-provider-datadog
        examples:
            - name: dev_ro_role_mapping
              manifest: |-
                {
                  "key": "Member-of",
                  "role": "${data.datadog_role.ro_role.id}",
                  "value": "Development"
                }
              references:
                role: data.datadog_role.ro_role.id
        argumentDocs:
            id: (String) The ID of this resource.
            key: (String) Identity provider key.
            role: (String) The ID of a role to attach to all users with the corresponding key and value. Cannot be used in conjunction with team.
            team: (String) The ID of a team to add all users with the corresponding key and value to. Cannot be used in conjunction with role.
            value: (String) Identity provider value.
        importStatements:
            - |-
              # AuthN mappings can be imported using their ID, e.g.
              terraform import datadog_authn_mapping.dev_ro_mapping 000000-0000-0000-0000-000000000000
    datadog_aws_cur_config:
        subCategory: ""
        description: 'Provides a Datadog AWS CUR (Cost and Usage Report) configuration resource. This enables Datadog Cloud Cost Management to access your AWS billing data by configuring the connection to your AWS Cost and Usage Report. Prerequisites: An active Datadog AWS integration, existing AWS Cost and Usage Report, and proper S3 bucket permissions.'
        name: datadog_aws_cur_config
        title: datadog_aws_cur_config Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "account_filters": [
                    {
                      "excluded_accounts": [
                        "123456789123",
                        "123456789143"
                      ],
                      "include_new_accounts": true
                    }
                  ],
                  "account_id": "123456789123",
                  "bucket_name": "dd-cost-bucket",
                  "bucket_region": "us-east-1",
                  "report_name": "dd-report-name",
                  "report_prefix": "dd-report-prefix"
                }
        argumentDocs:
            account_filters: (Block, Optional) (see below for nested schema)
            account_id: (String) The AWS account ID of your billing/payer account. For AWS Organizations, this is typically the management account ID.
            bucket_name: (String) The S3 bucket name where your AWS Cost and Usage Report files are stored. This bucket must have appropriate IAM permissions for Datadog access and should be in the same AWS account as the CUR report.
            bucket_region: (String) The AWS region where the S3 bucket containing your Cost and Usage Report is located (e.g., us-east-1, eu-west-1).
            created_at: (String) The timestamp when the AWS CUR configuration was created.
            error_messages: (List of String) List of error messages if the AWS CUR configuration encountered any issues during setup or data processing.
            excluded_accounts: (List of String) List of AWS account IDs to exclude from cost analysis. Only used when include_new_accounts is true. Cannot be used together with included_accounts.
            id: (String) The ID of this resource.
            include_new_accounts: (Boolean) Whether to automatically include new member accounts in your cost analysis. When true, use excluded_accounts to specify accounts to exclude. When false, use included_accounts to specify only the accounts to include.
            included_accounts: (List of String) List of AWS account IDs to include in cost analysis. Only used when include_new_accounts is false. Cannot be used together with excluded_accounts.
            report_name: (String) The exact name of your AWS Cost and Usage Report as configured in AWS Billing preferences. This must match the report name exactly as it appears in your AWS billing settings.
            report_prefix: (String) The S3 key prefix where your Cost and Usage Report files are stored within the bucket (e.g., 'cur-reports/', 'billing/cur/').
            status: (String) The current status of the AWS CUR configuration.
            status_updated_at: (String) The timestamp when the configuration status was last updated.
            updated_at: (String) The timestamp when the AWS CUR configuration was last modified.
        importStatements:
            - terraform import datadog_aws_cur_config.aws_cur_report <cloud_account_id>
