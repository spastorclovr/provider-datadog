    datadog_monitor_json:
        subCategory: ""
        description: Provides a Datadog monitor JSON resource. This can be used to create and manage Datadog monitors using the JSON definition.
        name: datadog_monitor_json
        title: datadog_monitor_json Resource - terraform-provider-datadog
        examples:
            - name: monitor_json
              manifest: |-
                {
                  "monitor": "{\n    \"name\": \"Example monitor - service check\",\n    \"type\": \"service check\",\n    \"query\": \"\\\"ntp.in_sync\\\".by(\\\"*\\\").last(2).count_by_status()\",\n    \"message\": \"Change the message triggers if any host's clock goes out of sync with the time given by NTP. The offset threshold is configured in the Agent's 'ntp.yaml' file.\\n\\nSee [Troubleshooting NTP Offset issues](https://docs.datadoghq.com/agent/troubleshooting/ntp for more details on cause and resolution.\",\n    \"tags\": [],\n    \"multi\": true,\n\t\"restricted_roles\": null,\n    \"options\": {\n        \"include_tags\": true,\n        \"new_host_delay\": 150,\n        \"notify_audit\": false,\n        \"notify_no_data\": false,\n        \"thresholds\": {\n            \"warning\": 1,\n            \"ok\": 1,\n            \"critical\": 1\n        }\n    },\n    \"priority\": null,\n    \"classification\": \"custom\"\n}\n"
                }
        argumentDocs:
            id: (String) The ID of this resource.
            monitor: (String) The JSON formatted definition of the monitor.
            url: (String) The URL of the monitor.
        importStatements:
            - terraform import datadog_monitor_json.monitor_json 123456
    datadog_monitor_notification_rule:
        subCategory: ""
        description: Provides a Datadog MonitorNotificationRule resource.
        name: datadog_monitor_notification_rule
        title: datadog_monitor_notification_rule Resource - terraform-provider-datadog
        examples:
            - name: team_checkout_notification_rule
              manifest: |-
                {
                  "filter": [
                    {
                      "tags": [
                        "team:payment"
                      ]
                    }
                  ],
                  "name": "Route alerts from checkout team",
                  "recipients": [
                    "slack-checkout-ops",
                    "jira-checkout"
                  ]
                }
            - name: team_payment_notification_rule
              manifest: |-
                {
                  "conditional_recipients": [
                    {
                      "conditions": [
                        {
                          "recipients": [
                            "oncall-payment",
                            "slack-payment"
                          ],
                          "scope": "priority:p1"
                        },
                        {
                          "recipients": [
                            "slack-payment"
                          ],
                          "scope": "priority:p5"
                        }
                      ],
                      "fallback_recipients": [
                        "slack-payment"
                      ]
                    }
                  ],
                  "filter": [
                    {
                      "scope": "team:payment AND NOT env:dev AND service:(payment-processing OR payment-gateway)"
                    }
                  ],
                  "name": "Routing logic for team payment"
                }
        argumentDocs:
            conditional_recipients: (Block, Optional) Use conditional recipients to define different recipients for different situations. Cannot be used with recipients. (see below for nested schema)
            conditions: (Block List) Conditions of the notification rule. (see below for nested schema)
            fallback_recipients: (Set of String) If none of the conditions applied, fallback_recipients will get notified.
            filter: (Block, Optional) Specifies the matching criteria for monitor notifications. (see below for nested schema)
            id: (String) The ID of this resource.
            name: (String) The name of the monitor notification rule.
            recipients: (Set of String) List of recipients to notify. Cannot be used with conditional_recipients.
            scope: '(String) Defines the condition under which the recipients are notified. Supported formats: Monitor status condition using transition_type:<status> (for example transition_type:is_alert) or a single tag key:value pair (for example env:prod).'
            tags: (Set of String) A list of tag key:value pairs (e.g. team:product). All tags must match (AND semantics).
        importStatements:
            - terraform import datadog_monitor_notification_rule.new_list "00e000000-0000-1234-0000-000000000000"
    datadog_observability_pipeline:
        subCategory: ""
        description: Provides a Datadog Observability Pipeline resource. Observability Pipelines allows you to collect and process logs within your own infrastructure, and then route them to downstream integrations. Datadog recommends using the -parallelism=1 option to apply this resource.
        name: datadog_observability_pipeline
        title: datadog_observability_pipeline Resource - terraform-provider-datadog
        examples:
            - name: test
              manifest: |-
                {
                  "config": [
                    {
                      "destination": [
                        {
                          "datadog_logs": [
                            {}
                          ],
                          "id": "destination-1",
                          "inputs": [
                            "processor-group-1"
                          ]
                        }
                      ],
                      "processor_group": [
                        {
                          "display_name": "processor group",
                          "enabled": true,
                          "id": "processor-group-1",
                          "include": "service:my-service",
                          "inputs": [
                            "source-1"
                          ],
                          "processor": [
                            {
                              "display_name": "json parser",
                              "enabled": true,
                              "id": "parser-1",
                              "include": "service:my-service",
                              "parse_json": [
                                {
                                  "field": "message"
                                }
                              ]
                            },
                            {
                              "display_name": "filter",
                              "enabled": true,
                              "filter": [
                                {}
                              ],
                              "id": "filter-1",
                              "include": "service:my-service"
                            }
                          ]
                        }
                      ],
                      "source": [
                        {
                          "datadog_agent": [
                            {
                              "tls": [
                                {
                                  "ca_file": "/etc/certs/ca.crt",
                                  "crt_file": "/etc/certs/client.crt",
                                  "key_file": "/etc/certs/client.key"
                                }
                              ]
                            }
                          ],
                          "id": "source-1"
                        }
                      ]
                    }
                  ],
                  "name": "test pipeline"
                }
