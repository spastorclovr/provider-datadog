        argumentDocs:
            aws: (Block, Optional) AWS-specific configuration. Required when cloud_provider is aws. (see below for nested schema)
            aws_account_id: (String) AWS Account ID of the account holding the bucket.
            azure: (Block, Optional) Azure-specific configuration. Required when cloud_provider is azure. (see below for nested schema)
            client_id: (String) Azure Client ID.
            cloud_provider: (String) The cloud provider type. Valid values are aws, azure, gcp.
            container: (String) Azure Storage Container name.
            destination_bucket_name: (String) Name of the S3 bucket holding the inventory files.
            destination_bucket_region: (String) AWS Region of the bucket holding the inventory files.
            destination_prefix: (String) Prefix path within the bucket for inventory files.
            gcp: (Block, Optional) GCP-specific configuration. Required when cloud_provider is gcp. (see below for nested schema)
            id: (String) The ID of this resource.
            project_id: (String) GCP Project ID of the project holding the bucket.
            resource_group: (String) Azure Resource Group name.
            service_account_email: (String) Service account email used for reading the bucket.
            source_bucket_name: (String) Name of the source bucket the inventory report is generated for.
            storage_account: (String) Azure Storage Account name.
            subscription_id: (String) Azure Subscription ID.
            tenant_id: (String) Azure Tenant ID.
        importStatements:
            - |-
              # Import using the sync config ID returned by the API
              terraform import datadog_cloud_inventory_sync_config.example "<sync-config-id>"
