    datadog_dashboard_list:
        subCategory: ""
        description: Provides a Datadog dashboard_list resource. This can be used to create and manage Datadog Dashboard Lists and the individual dashboards within them.
        name: datadog_dashboard_list
        title: datadog_dashboard_list Resource - terraform-provider-datadog
        examples:
            - name: new_list
              manifest: |-
                {
                  "dash_item": [
                    {
                      "dash_id": "${datadog_dashboard.time.id}",
                      "type": "custom_timeboard"
                    },
                    {
                      "dash_id": "${datadog_dashboard.screen.id}",
                      "type": "custom_screenboard"
                    }
                  ],
                  "name": "Terraform Created List"
                }
              references:
                dash_item.dash_id: datadog_dashboard.screen.id
              dependencies:
                datadog_dashboard.screen: |-
                    {
                      "description": "Created using the Datadog provider in Terraform",
                      "is_read_only": false,
                      "layout_type": "free",
                      "title": "TF Test Free Layout Dashboard",
                      "widget": [
                        {
                          "event_stream_definition": [
                            {
                              "event_size": "l",
                              "live_span": "1h",
                              "query": "*",
                              "title": "Widget Title",
                              "title_align": "left",
                              "title_size": 16
                            }
                          ],
                          "widget_layout": [
                            {
                              "height": 43,
                              "width": 32,
                              "x": 5,
                              "y": 5
                            }
                          ]
                        }
                      ]
                    }
                datadog_dashboard.time: |-
                    {
                      "description": "Created using the Datadog provider in Terraform",
                      "is_read_only": true,
                      "layout_type": "ordered",
                      "title": "TF Test Layout Dashboard",
                      "widget": [
                        {
                          "alert_graph_definition": [
                            {
                              "alert_id": "1234",
                              "live_span": "1h",
                              "title": "Widget Title",
                              "viz_type": "timeseries"
                            }
                          ]
                        }
                      ]
                    }
        argumentDocs:
            dash_id: (String) The ID of the dashboard to add
            dash_item: (Block Set) A set of dashboard items that belong to this list (see below for nested schema)
            id: (String) The ID of this resource.
            name: (String) The name of the Dashboard List
            type: (String) The type of this dashboard. Valid values are custom_timeboard, custom_screenboard, integration_screenboard, integration_timeboard, host_timeboard.
        importStatements:
            - terraform import datadog_dashboard_list.new_list 123456
    datadog_dataset:
        subCategory: ""
        description: Provides a Datadog Dataset resource. This can be used to create and manage Datadog datasets.
        name: datadog_dataset
        title: datadog_dataset Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "name": "HR Dataset",
                  "principals": [
                    "role:00000000-0000-1111-0000-000000000000"
                  ],
                  "product_filters": [
                    {
                      "filters": [
                        "@application.id:123"
                      ],
                      "product": "rum"
                    }
                  ]
                }
        argumentDocs:
            created_at: (String) Indicates when the dataset was created (in ISO 8601).
            created_by: (String) Indicates who created the dataset.
            filters: (Set of String) A list of tag-based filters used to restrict access to the product type. Each filter is formatted as @tag.key:value.
            id: (String) The ID of this resource.
            name: (String) The name of the dataset.
            principals: '(Set of String) An array of principals. A principal is a subject or group of subjects. Each principal is formatted as type:id. Supported types: role and team.'
            product: '(String) The product type of the dataset. Supported types: apm, rum, synthetics, metrics, logs, sd_repoinfo, error_tracking, cloud_cost, and ml_obs.'
            product_filters: (Block Set) (see below for nested schema)
        importStatements:
            - terraform import datadog_dataset.foo "<dataset_id>"
    datadog_datastore:
        subCategory: ""
        description: Provides a Datadog Datastore resource. This can be used to create and manage Datadog datastore.
        name: datadog_datastore
        title: datadog_datastore Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "description": "My application datastore",
                  "name": "my-datastore",
                  "org_access": "contributor",
                  "primary_column_name": "id",
                  "primary_key_generation_strategy": "none"
                }
            - name: auto_uuid
              manifest: |-
                {
                  "description": "Datastore with auto-generated primary keys",
                  "name": "my-uuid-datastore",
                  "primary_column_name": "uuid",
                  "primary_key_generation_strategy": "uuid"
                }
        argumentDocs:
            created_at: (String) Timestamp when the datastore was created.
            creator_user_id: (Number) The numeric ID of the user who created the datastore.
            creator_user_uuid: (String) The UUID of the user who created the datastore.
            description: (String) A human-readable description about the datastore.
            id: (String) The ID of this resource.
            modified_at: (String) Timestamp when the datastore was last modified.
            name: (String) The display name for the new datastore.
            org_access: (String) The organization access level for the datastore. For example, 'contributor'.
            org_id: (Number) The ID of the organization that owns this datastore.
            primary_column_name: '(String) The name of the primary key column for this datastore. Primary column names:   - Must abide by both PostgreSQL naming conventions   - Cannot exceed 63 characters'
            primary_key_generation_strategy: (String) Can be set to uuid to automatically generate primary keys when new items are added. Default value is none, which requires you to supply a primary key for each new item.
        importStatements:
            - terraform import datadog_datastore.foo "datastore-id"
    datadog_datastore_item:
        subCategory: ""
        description: Provides a Datadog Datastore Item resource. This can be used to create and manage items in a Datadog datastore.
        name: datadog_datastore_item
        title: datadog_datastore_item Resource - terraform-provider-datadog
        examples:
            - name: user1
              manifest: |-
                {
                  "datastore_id": "${datadog_datastore.example.id}",
                  "item_key": "user-123",
                  "value": {
                    "email": "john@example.com",
                    "id": "user-123",
                    "status": "active",
                    "username": "john_doe"
                  }
                }
              references:
                datastore_id: datadog_datastore.example.id
              dependencies:
                datadog_datastore.example: |-
                    {
                      "description": "Datastore for user data",
                      "name": "users-datastore",
                      "primary_column_name": "id",
                      "primary_key_generation_strategy": "none"
                    }
            - name: user2
              manifest: |-
                {
                  "datastore_id": "${datadog_datastore.example.id}",
                  "item_key": "user-456",
                  "value": {
                    "email": "jane@example.com",
                    "id": "user-456",
                    "status": "active",
                    "username": "jane_doe"
                  }
                }
              references:
                datastore_id: datadog_datastore.example.id
              dependencies:
                datadog_datastore.example: |-
                    {
                      "description": "Datastore for user data",
                      "name": "users-datastore",
                      "primary_column_name": "id",
                      "primary_key_generation_strategy": "none"
                    }
        argumentDocs:
            datastore_id: (String) The unique identifier of the datastore containing this item.
            id: (String) The ID of this resource.
            item_key: (String) The primary key value that identifies this item. Cannot exceed 256 characters.
            value: (Map of String) The data content (as key-value pairs) of the datastore item.
        importStatements:
            - terraform import datadog_datastore_item.foo "datastore-id:item-key"
    datadog_deployment_gate:
        subCategory: ""
        description: Provides a Datadog DeploymentGate resource. This can be used to create and manage Datadog deployment_gate.
        name: datadog_deployment_gate
        title: datadog_deployment_gate Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "dry_run": "false",
                  "env": "production",
                  "identifier": "my-gate",
                  "rule": [
                    {
                      "dry_run": false,
                      "name": "fdd",
                      "options": [
                        {
                          "duration": 1300,
                          "excluded_resources": [
                            "GET api/v1/test"
                          ]
                        }
                      ],
                      "type": "faulty_deployment_detection"
                    },
                    {
                      "dry_run": false,
                      "name": "monitor",
                      "options": [
                        {
                          "duration": 1300,
                          "query": "service:test-service"
                        }
                      ],
                      "type": "monitor"
                    }
                  ],
                  "service": "my-service"
                }
        argumentDocs:
            created_at: (String) Creation timestamp of the deployment gate.
            dry_run: (Boolean) Enable Dry Run to test gate behavior without impacting deployments. The evaluation of a dry run gate always responds with a pass status, but the in-app result is the real status based on rules evaluation. This is particularly useful when performing an initial evaluation of the gate behavior without impacting the deployment pipeline.
            duration: (Number) The duration for the rule.
            env: '(String) The target environment (example: dev).'
            excluded_resources: (List of String) Resources to exclude from faulty deployment detection.
            id: (String) The ID of this resource.
            identifier: (String) Unique name for multiple gates on the same service/environment.
            name: (String) The rule name. Must be unique within the deployment gate.
            options: (Block, Optional) Options for the deployment rule. (see below for nested schema)
            query: (String) The query for monitor rules.
            rule: (Block List) Deployment rules for this gate. (see below for nested schema)
            service: '(String) The service name (example: transaction-backend).'
            type: (String) The rule type (e.g., 'faulty_deployment_detection', 'monitor').
            updated_at: (String) Last update timestamp of the deployment gate.
        importStatements:
            - terraform import datadog_deployment_gate.new_list ""
    datadog_domain_allowlist:
        subCategory: ""
        description: Provides the Datadog Email Domain Allowlist resource. This can be used to manage the Datadog Email Domain Allowlist.
        name: datadog_domain_allowlist
        title: datadog_domain_allowlist Resource - terraform-provider-datadog
        examples:
            - name: example
              manifest: |-
                {
                  "domains": [
                    "@gmail.com"
                  ],
                  "enabled": true
                }
        argumentDocs:
            domains: (List of String) The domains within the domain allowlist.
            enabled: (Boolean) Whether the Email Domain Allowlist is enabled.
            id: (String) The ID of this resource.
        importStatements: []
    datadog_downtime:
        subCategory: ""
        description: This resource is deprecated — use the datadog_downtime_schedule resource instead. Provides a Datadog downtime resource. This can be used to create and manage Datadog downtimes.
        name: datadog_downtime
        title: datadog_downtime Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "end": 1483365600,
                  "monitor_id": 12345,
                  "recurrence": [
                    {
                      "period": 1,
                      "type": "days"
                    }
                  ],
                  "scope": [
                    "*"
                  ],
                  "start": 1483308000
                }
            - name: foo
              manifest: |-
                {
                  "end": 1483365600,
                  "recurrence": [
                    {
                      "period": 1,
                      "type": "days"
                    }
                  ],
                  "scope": [
                    "*"
                  ],
                  "start": 1483308000
                }
        argumentDocs:
            active: (Boolean) When true indicates this downtime is being actively applied
            active_child_id: (Number) The id corresponding to the downtime object definition of the active child for the original parent recurring downtime. This field will only exist on recurring downtimes.
            disabled: (Boolean) When true indicates this downtime is not being applied
            end: (Number) Optionally specify an end date when this downtime should expire. Accepts a Unix timestamp in UTC.
            end_date: (String) String representing date and time to end the downtime in RFC3339 format.
            id: (String) The ID of this resource.
            message: (String) An optional message to provide when creating the downtime, can include notification handles
            monitor_id: (Number) When specified, this downtime will only apply to this monitor
            monitor_tags: (Set of String) A list of monitor tags (up to 32) to base the scheduled downtime on. Only monitors that have all selected tags are silenced
            mute_first_recovery_notification: (Boolean) When true the first recovery notification during the downtime will be muted Defaults to false.
            period: (Number) How often to repeat as an integer. For example to repeat every 3 days, select a type of days and a period of 3.
            recurrence: '(Block List, Max: 1) Optional recurring schedule for this downtime (see below for nested schema)'
            rrule: (String) The RRULE standard for defining recurring events. For example, to have a recurring event on the first day of each month, use FREQ=MONTHLY;INTERVAL=1. Most common rrule options from the iCalendar Spec are supported. Attributes specifying the duration in RRULE are not supported (for example, DTSTART, DTEND, DURATION). Only applicable when type is rrule.
            scope: (List of String) specify the group scope to which this downtime applies. For everything use '*'
            start: (Number) Specify when this downtime should start. Accepts a Unix timestamp in UTC.
            start_date: (String) String representing date and time to start the downtime in RFC3339 format.
            timezone: (String) The timezone for the downtime. Follows IANA timezone database identifiers. Defaults to "UTC".
            type: (String) One of days, weeks, months, years, or rrule.
            until_date: (Number) The date at which the recurrence should end as a POSIX timestamp. until_occurrences and until_date are mutually exclusive.
            until_occurrences: (Number) How many times the downtime will be rescheduled. until_occurrences and until_date are mutually exclusive.
            week_days: '(List of String) A list of week days to repeat on. Choose from: Mon, Tue, Wed, Thu, Fri, Sat or Sun. Only applicable when type is weeks. First letter must be capitalized.'
        importStatements:
            - terraform import datadog_downtime.bytes_received_localhost 2081
    datadog_downtime_schedule:
        subCategory: ""
        description: Provides a Datadog DowntimeSchedule resource. This can be used to create and manage Datadog downtimes.
        name: datadog_downtime_schedule
        title: datadog_downtime_schedule Resource - terraform-provider-datadog
        examples:
            - name: downtime_schedule_example
              manifest: |-
                {
                  "display_timezone": "America/New_York",
                  "message": "Message about the downtime",
                  "monitor_identifier": [
                    {
                      "monitor_tags": [
                        "test:123",
                        "data:test"
                      ]
                    }
                  ],
                  "mute_first_recovery_notification": true,
                  "notify_end_states": [
                    "alert",
                    "warn"
                  ],
                  "notify_end_types": [
                    "canceled",
                    "expired"
                  ],
                  "recurring_schedule": [
                    {
                      "recurrence": [
                        {
                          "duration": "1h",
                          "rrule": "FREQ=DAILY;INTERVAL=1",
                          "start": "2050-01-02T03:04:05"
                        }
                      ],
                      "timezone": "America/New_York"
                    }
                  ],
                  "scope": "env:us9-prod7 AND team:test123"
                }
        argumentDocs:
            display_timezone: (String) The timezone in which to display the downtime's start and end times in Datadog applications. This is not used as an offset for scheduling.
            duration: (String) The length of the downtime. Must begin with an integer and end with one of 'm', 'h', d', or 'w'.
            end: (String) ISO-8601 Datetime to end the downtime. Must include a UTC offset of zero. If not provided, the downtime never ends.
            id: (String) The ID of this resource.
            message: (String) A message to include with notifications for this downtime. Email notifications can be sent to specific users by using the same @username notation as events.
            monitor_id: (Number) ID of the monitor to prevent notifications.
            monitor_identifier: (Block, Optional) (see below for nested schema)
            monitor_tags: (Set of String) A list of monitor tags. For example, tags that are applied directly to monitors, not tags that are used in monitor queries (which are filtered by the scope parameter), to which the downtime applies. The resulting downtime applies to monitors that match all provided monitor tags. Setting monitor_tags to [*] configures the downtime to mute all monitors for the given scope.
            mute_first_recovery_notification: (Boolean) If the first recovery notification during a downtime should be muted.
            notify_end_states: (Set of String) States that will trigger a monitor notification when the notify_end_types action occurs.
            notify_end_types: (Set of String) Actions that will trigger a monitor notification if the downtime is in the notify_end_types state.
            one_time_schedule: (Block, Optional) (see below for nested schema)
            recurrence: (Block List) (see below for nested schema)
            recurring_schedule: (Block, Optional) (see below for nested schema)
            rrule: '(String) The RRULE standard for defining recurring events. For example, to have a recurring event on the first day of each month, set the type to rrule and set the FREQ to MONTHLY and BYMONTHDAY to 1. Most common rrule options from the iCalendar Spec are supported.  Note: Attributes specifying the duration in RRULE are not supported (for example, DTSTART, DTEND, DURATION). More examples available in this downtime guide.'
            scope: (String) The scope to which the downtime applies. Must follow the common search syntax.
            start: (String) ISO-8601 Datetime to start the downtime. Must include a UTC offset of zero. If not provided, the downtime starts the moment it is created.
            timezone: (String) The timezone in which to schedule the downtime.
        importStatements:
            - terraform import datadog_downtime_schedule.new_list "00e000000-0000-1234-0000-000000000000"
    datadog_gcp_uc_config:
        subCategory: ""
        description: Provides a Datadog GcpUcConfig resource. This can be used to create and manage Datadog gcp_uc_config.
        name: datadog_gcp_uc_config
        title: datadog_gcp_uc_config Resource - terraform-provider-datadog
        examples:
