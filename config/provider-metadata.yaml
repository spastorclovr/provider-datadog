    datadog_cost_budget:
        subCategory: ""
        description: Provides a Datadog Cost Budget resource.
        name: datadog_cost_budget
        title: datadog_cost_budget Resource - terraform-provider-datadog
        examples:
            - name: with_tags
              manifest: |-
                {
                  "budget_line": [
                    {
                      "amounts": {
                        "202601": 2000,
                        "202602": 2200,
                        "202603": 2000
                      },
                      "tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "production"
                        }
                      ]
                    },
                    {
                      "amounts": {
                        "202601": 1000,
                        "202602": 1100,
                        "202603": 1000
                      },
                      "tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "staging"
                        }
                      ]
                    }
                  ],
                  "end_month": 202603,
                  "metrics_query": "sum:aws.cost.amortized{*} by {environment}",
                  "name": "Multi-Environment Budget",
                  "start_month": 202601
                }
            - name: hierarchical
              manifest: |-
                {
                  "budget_line": [
                    {
                      "amounts": {
                        "202601": 1500,
                        "202602": 1600,
                        "202603": 1500
                      },
                      "child_tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "production"
                        }
                      ],
                      "parent_tag_filters": [
                        {
                          "tag_key": "team",
                          "tag_value": "backend"
                        }
                      ]
                    },
                    {
                      "amounts": {
                        "202601": 500,
                        "202602": 550,
                        "202603": 500
                      },
                      "child_tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "staging"
                        }
                      ],
                      "parent_tag_filters": [
                        {
                          "tag_key": "team",
                          "tag_value": "frontend"
                        }
                      ]
                    }
                  ],
                  "end_month": 202603,
                  "metrics_query": "sum:aws.cost.amortized{*} by {team,environment}",
                  "name": "Team-Based AWS Budget",
                  "start_month": 202601
                }
            - name: legacy_with_tags
              manifest: |-
                {
                  "end_month": 202603,
                  "entries": [
                    {
                      "amount": 2000,
                      "month": 202601,
                      "tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "production"
                        }
                      ]
                    },
                    {
                      "amount": 2200,
                      "month": 202602,
                      "tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "production"
                        }
                      ]
                    },
                    {
                      "amount": 2000,
                      "month": 202603,
                      "tag_filters": [
                        {
                          "tag_key": "environment",
                          "tag_value": "production"
                        }
                      ]
                    }
                  ],
                  "metrics_query": "sum:aws.cost.amortized{*} by {environment}",
                  "name": "Production Budget (Legacy)",
                  "start_month": 202601
                }
        argumentDocs:
            amount: (Number)
            amounts: '(Map of Number) Map of month (YYYYMM) to budget amount. Example: {"202601": 1000.0, "202602": 1200.0}'
            budget_line: '(Block Set) Budget lines that group monthly amounts by tag combination. Use this instead of entries for a more convenient schema. Note: The order of budget_line blocks does not matter. (see below for nested schema)'
            child_tag_filters: '(Block List) Child tag filters for hierarchical budgets. Note: Must be used with parent_tag_filters. Cannot be used with tag_filters. (see below for nested schema)'
            end_month: (Number) The month when the budget ends (YYYYMM).
            entries: '(Block List, Deprecated) The entries of the budget. Note: You must provide entries for all months in the budget period. For hierarchical budgets, each unique tag combination must have entries for all months. (see below for nested schema)'
            id: (String) The ID of the budget.
            metrics_query: '(String) The cost query used to track against the budget. Note: For hierarchical budgets using by {tag1,tag2}, the order of tags determines the UI hierarchy (parent, child).'
            month: (Number)
            name: (String) The name of the budget.
            parent_tag_filters: '(Block List) Parent tag filters for hierarchical budgets. Note: Must be used with child_tag_filters. Cannot be used with tag_filters. (see below for nested schema)'
            start_month: (Number) The month when the budget starts (YYYYMM).
            tag_filters: '(Block List) Tag filters for non-hierarchical budgets. Note: Cannot be used with parent_tag_filters/child_tag_filters. (see below for nested schema)'
            tag_key: (String) Must be one of the tags from the metrics_query.
            tag_value: (String)
            total_amount: (Number) The sum of all budget entries' amounts.
        importStatements:
            - |-
              # Cost budgets can be imported using their ID, e.g.
              terraform import datadog_cost_budget.example a1b2c3d4-e5f6-7890-abcd-ef1234567890
    datadog_csm_threats_agent_rule:
