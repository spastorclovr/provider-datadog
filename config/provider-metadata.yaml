    datadog_custom_allocation_rule:
        subCategory: ""
        description: Provides a Datadog Custom Allocation Rule Order API resource. This can be used to manage the order of Datadog Custom Allocation Rules.
        name: datadog_custom_allocation_rule
        title: datadog_custom_allocation_rules Resource - terraform-provider-datadog
        examples:
            - name: rule_1
              manifest: |-
                {
                  "costs_to_allocate": [
                    {
                      "condition": "is",
                      "tag": "aws_product",
                      "value": "AmazonEC2"
                    }
                  ],
                  "enabled": true,
                  "providernames": [
                    "aws"
                  ],
                  "rule_name": "my-custom-rule-1",
                  "strategy": [
                    {
                      "allocated_by_tag_keys": [
                        "team"
                      ],
                      "based_on_costs": [
                        {
                          "condition": "is",
                          "tag": "aws_product",
                          "value": "AmazonEC2"
                        }
                      ],
                      "method": "even"
                    }
                  ]
                }
              dependencies:
                datadog_custom_allocation_rules.override_order: |-
                    {
                      "override_ui_defined_resources": true,
                      "rule_ids": [
