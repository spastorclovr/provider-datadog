    datadog_team_notification_rule:
        subCategory: ""
        description: Provides a Datadog team notification rule resource. This can be used to create and manage notification rules for Datadog teams.
        name: datadog_team_notification_rule
        title: datadog_team_notification_rule Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "email": [
                    {
                      "enabled": true
                    }
                  ],
                  "ms_teams": [
                    {
                      "connector_name": "test-teams-handle"
                    }
                  ],
                  "pagerduty": [
                    {
                      "service_name": "my-service"
                    }
                  ],
                  "slack": [
                    {
                      "channel": "#test-channel",
                      "workspace": "Datadog"
                    }
                  ],
                  "team_id": "${datadog_team.foo.id}"
                }
              references:
                team_id: datadog_team.foo.id
              dependencies:
                datadog_team.foo: |-
                    {
                      "description": "Example team",
                      "handle": "example-team",
                      "name": "Example Team"
                    }
        argumentDocs:
            channel: '(String) Slack channel name for notifications (for example, #alerts or #team-notifications).'
            connector_name: (String) MS Teams connector name used to route notifications to the appropriate channel.
            email: (Block, Optional) The email notification settings. (see below for nested schema)
            enabled: (Boolean) Whether to send email notifications to team members when alerts are triggered.
            id: (String) The ID of this resource.
            ms_teams: (Block, Optional) The MS Teams notification settings. (see below for nested schema)
            pagerduty: (Block, Optional) The PagerDuty notification settings. (see below for nested schema)
            service_name: (String) PagerDuty service name to send incident notifications to. The service name can be found in your PagerDuty service settings.
            slack: (Block, Optional) The Slack notification settings. (see below for nested schema)
            team_id: (String) The ID of the team that this notification rule belongs to.
            workspace: (String) Slack workspace name where the channel is located.
        importStatements:
            - |-
              # This resource is imported using team_id and rule_id separated by `:`.

              terraform import datadog_team_notification_rule.foo "${team_id}:${rule_id}"
    datadog_team_permission_setting:
        subCategory: ""
        description: Provides a Datadog TeamPermissionSetting resource. This can be used to manage Datadog team_permission_setting.
        name: datadog_team_permission_setting
        title: datadog_team_permission_setting Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "action": "manage_membership",
                  "team_id": "${datadog_team.foo.id}",
                  "value": "organization"
                }
              references:
                team_id: datadog_team.foo.id
              dependencies:
                datadog_team.foo: |-
                    {
