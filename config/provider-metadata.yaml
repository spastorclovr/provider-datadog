    datadog_reference_table:
        subCategory: ""
        description: Provides a Datadog Reference Table resource for cloud storage sources (S3, GCS, Azure). This can be used to create and manage Datadog reference tables that sync data from cloud storage. For setup instructions including granting Datadog read access to your cloud storage bucket, see the Reference Tables documentation https://docs.datadoghq.com/reference_tables/?tab=cloudstorage#create-a-reference-table.
        name: datadog_reference_table
        title: datadog_reference_table Resource - terraform-provider-datadog
        examples:
            - name: s3_table
              manifest: |-
                {
                  "description": "Product catalog synced from S3",
                  "file_metadata": [
                    {
                      "access_details": [
                        {
                          "aws_detail": [
                            {
                              "aws_account_id": "123456789000",
                              "aws_bucket_name": "my-data-bucket",
                              "file_path": "reference-tables/products.csv"
                            }
                          ]
                        }
                      ],
                      "sync_enabled": true
                    }
                  ],
                  "schema": [
                    {
                      "fields": [
                        {
                          "name": "product_id",
                          "type": "STRING"
                        },
                        {
                          "name": "product_name",
                          "type": "STRING"
                        },
                        {
                          "name": "category",
                          "type": "STRING"
                        },
                        {
                          "name": "price_cents",
                          "type": "INT32"
                        }
                      ],
                      "primary_keys": [
                        "product_id"
                      ]
                    }
                  ],
                  "source": "S3",
                  "table_name": "products_catalog",
                  "tags": [
                    "source:s3",
                    "team:catalog",
                    "env:production"
                  ]
                }
        argumentDocs:
            access_details: (Block, Optional) Cloud storage access configuration. Exactly one of aws_detail, gcp_detail, or azure_detail must be specified. (see below for nested schema)
            aws_account_id: (String) The ID of the AWS account.
            aws_bucket_name: (String) The name of the AWS S3 bucket.
            aws_detail: (Block, Optional) AWS S3 access configuration. Required when source is S3. (see below for nested schema)
            azure_client_id: (String) The Azure client ID (application ID).
            azure_container_name: (String) The name of the Azure container.
            azure_detail: (Block, Optional) Azure Blob Storage access configuration. Required when source is AZURE. (see below for nested schema)
            azure_storage_account_name: (String) The name of the Azure storage account.
            azure_tenant_id: (String) The ID of the Azure tenant.
            created_by: (String) UUID of the user who created the reference table.
            description: (String) The description of the reference table.
            error_message: (String) Error message from the last sync attempt, if any.
            error_row_count: (Number) The number of rows that failed to sync.
            error_type: (String) The type of error that occurred during file processing.
            fields: (Block List) List of fields in the table schema. At least one field is required. Schema is only set on create. (see below for nested schema)
            file_metadata: (Block, Optional) Configuration for cloud storage file access and sync settings. (see below for nested schema)
            file_path: (String) The relative file path from the AWS S3 bucket root to the CSV file.
            gcp_bucket_name: (String) The name of the GCP bucket.
            gcp_detail: (Block, Optional) Google Cloud Storage access configuration. Required when source is GCS. (see below for nested schema)
            gcp_project_id: (String) The ID of the GCP project.
            gcp_service_account_email: (String) The email of the GCP service account used to access the bucket.
            id: (String) The ID of this resource.
            last_updated_by: (String) UUID of the user who last updated the reference table.
            name: (String) The name of the field.
            primary_keys: (List of String) List of field names that serve as primary keys for the table. Currently only one primary key is supported.
            row_count: (Number) The number of successfully processed rows in the reference table.
            schema: (Block, Optional) The schema definition for the reference table, including field definitions and primary keys. This block is required. Schema is only set on create; updates are derived from the file asynchronously. (see below for nested schema)
            source: (String) The source type for the reference table. Valid values are S3, GCS, AZURE.
            status: (String) The status of the reference table (e.g., DONE, PROCESSING, ERROR).
            sync_enabled: (Boolean) Whether this table should automatically sync with the cloud storage source.
            table_name: (String) The name of the reference table. This must be unique within your organization.
            tags: (List of String) A list of tags to associate with the reference table.
            type: '(String) The data type of the field. Must be one of: STRING, INT32. Valid values are STRING, INT32.'
            updated_at: (String) The timestamp of the last update to the reference table in ISO 8601 format.
        importStatements:
            - "#!/bin/bash\n# Import an existing reference table by its UUID\n\nterraform import datadog_reference_table.imported_table \"00000000-0000-0000-0000-000000000000\"\n\n# After importing, you must add the full resource configuration to your .tf file.\n# Use `terraform state show datadog_reference_table.imported_table` to view the imported schema\n# and other attributes, then add the matching configuration:\n# \n# resource \"datadog_reference_table\" \"imported_table\" {\n#   table_name  = \"existing_table\"\n#   description = \"Previously created table\"\n#   source      = \"S3\"  # or \"GCS\" or \"AZURE\"\n#   \n#   file_metadata {\n#     sync_enabled = true\n#     \n#     access_details {\n#       aws_detail {\n#         aws_account_id  = \"123456789000\"\n#         aws_bucket_name = \"existing-bucket\"\n#         file_path       = \"data/existing.csv\"\n#       }\n#     }\n#   }\n#   \n#   schema {\n#     primary_keys = [\"id\"]\n#     \n#     fields {\n#       name = \"id\"\n#       type = \"STRING\"\n#     }\n#     \n#     fields {\n#       name = \"value\"\n#       type = \"STRING\"\n#     }\n#   }\n#   \n#   tags = [\"imported:true\"]\n# }"
    datadog_restriction_policy:
        subCategory: ""
        description: Provides a Datadog RestrictionPolicy resource. This can be used to create and manage Datadog restriction policies.
        name: datadog_restriction_policy
        title: datadog_restriction_policy Resource - terraform-provider-datadog
        examples:
            - name: foo
              manifest: |-
                {
                  "bindings": [
                    {
                      "principals": [
                        "role:00000000-0000-1111-0000-000000000000"
                      ],
                      "relation": "editor"
                    },
                    {
                      "principals": [
                        "org:10000000-0000-1111-0000-000000000000"
                      ],
                      "relation": "viewer"
                    }
                  ],
                  "resource_id": "security-rule:abc-def-ghi"
                }
        argumentDocs:
            bindings: (Block Set) (see below for nested schema)
            id: (String) The ID of this resource.
            principals: '(Set of String) An array of principals. A principal is a subject or group of subjects. Each principal is formatted as type:id. Supported types: role, team, user, and org. Org ID can be obtained using a GET /api/v2/current_user API request. Find it in the data.relationships.org.data.id field.'
            relation: (String) The role/level of access. See this page for more details https://docs.datadoghq.com/api/latest/restriction-policies/#supported-relations-for-resources
            resource_id: (String) Identifier for the resource, formatted as resource_type:resource_id.
        importStatements:
            - terraform import datadog_restriction_policy.new_list "<policy_id>"
    datadog_role:
        subCategory: ""
        description: Provides a Datadog role resource. This can be used to create and manage Datadog roles.
        name: datadog_role
        title: datadog_role Resource - terraform-provider-datadog
        examples:
            - name: api_key_manager
              manifest: |-
                {
                  "name": "API Key Manager",
                  "permission": [
                    {
                      "id": "${data.datadog_permissions.dd_perms.permissions.api_keys_read}"
                    },
                    {
                      "id": "${data.datadog_permissions.dd_perms.permissions.api_keys_write}"
                    }
                  ]
                }
              references:
                permission.id: data.datadog_permissions.dd_perms.permissions.api_keys_write
        argumentDocs:
            default_permissions_opt_out: (Boolean) If set to true, the role does not have default (restricted) permissions unless they are explicitly set. The include_restricted attribute for the datadog_permissions data source must be set to true to manage default permissions in Terraform.
            id: (String) The ID of this resource.
            name: (String) Name of the role.
            permission: (Block Set) Set of objects containing the permission ID and the name of the permissions granted to this role. (see below for nested schema)
            user_count: (Number) Number of users that have this role.
            validate: (Boolean) If set to false, skip the validation call done during plan.
        importStatements:
            - |-
              # Roles can be imported using their ID, e.g.
              terraform import datadog_role.example_role 000000-0000-0000-0000-000000000000
    datadog_rum_application:
        subCategory: ""
        description: Provides a Datadog RUM application resource. This can be used to create and manage Datadog RUM applications.
        name: datadog_rum_application
        title: datadog_rum_application Resource - terraform-provider-datadog
        examples:
            - name: rum_application
              manifest: |-
                {
                  "name": "my-application",
                  "product_analytics_retention_state": "NONE",
                  "rum_event_processing_state": "ALL",
                  "type": "browser"
                }
        argumentDocs:
            api_key_id: (Number) ID of the API key associated with the application.
            client_token: (String) The client token.
            id: (String) The ID of this resource.
            name: (String) Name of the RUM application.
            product_analytics_retention_state: (String) Controls the retention policy for Product Analytics data derived from RUM events. Valid values are MAX, NONE.
            rum_event_processing_state: (String) Configures which RUM events are processed and stored for the application. Valid values are ALL, ERROR_FOCUSED_MODE, NONE.
            type: (String) Type of the RUM application. Supported values are browser, ios, android, react-native, flutter. Defaults to "browser".
        importStatements:
            - terraform import datadog_rum_application.rum_application a1b2c3d4-a1b2-a1b2-a1b2-a1b2c3d4e5f6
    datadog_rum_metric:
        subCategory: ""
        description: Provides a Datadog RumMetric resource. This can be used to create and manage Datadog rum_metric.
        name: datadog_rum_metric
        title: datadog_rum_metric Resource - terraform-provider-datadog
        examples:
            - name: testing_rum_metric
              manifest: |-
                {
                  "compute": [
                    {
                      "aggregation_type": "distribution",
                      "include_percentiles": true,
                      "path": "@duration"
                    }
                  ],
                  "event_type": "session",
                  "filter": [
                    {
                      "query": "@service:web-ui"
                    }
                  ],
                  "group_by": [
                    {
                      "path": "@browser.name",
                      "tag_name": "browser_name"
                    }
                  ],
                  "name": "testing.rum.metric",
                  "uniqueness": [
                    {
                      "when": "match"
                    }
                  ]
                }
        argumentDocs:
            aggregation_type: (String) The type of aggregation to use.
            compute: (Block, Optional) (see below for nested schema)
            event_type: (String) The type of RUM events to filter on.
            filter: (Block, Optional) (see below for nested schema)
            group_by: (Block Set) (see below for nested schema)
            id: (String) The ID of this resource.
            include_percentiles: (Boolean) Toggle to include or exclude percentile aggregations for distribution metrics. Only present when aggregation_type is distribution.
            name: (String) The name of the RUM-based metric. This field can't be updated after creation.
            path: (String) The path to the value the RUM-based metric will aggregate on. Only present when aggregation_type is distribution.
            query: (String) The search query. Follows RUM search syntax.
            tag_name: (String) Name of the tag that gets created. By default, path is used as the tag name.
            uniqueness: (Block, Optional) (see below for nested schema)
            when: (String) When to count updatable events. match when the event is first seen, or end when the event is complete.
        importStatements:
            - terraform import datadog_rum_metric.testing_rum_metric "testing.rum.metric"
    datadog_rum_retention_filter:
        subCategory: ""
        description: Provides a Datadog RumRetentionFilter resource. This can be used to create and manage Datadog rum_retention_filter.
        name: datadog_rum_retention_filter
        title: datadog_rum_retention_filter Resource - terraform-provider-datadog
        examples:
            - name: testing_rum_retention_filter
              manifest: |-
                {
                  "application_id": "\u003cAPPLICATION_ID\u003e",
                  "enabled": false,
                  "event_type": "session",
                  "name": "testing.rum.retention_filter",
                  "query": "@session.has_replay:true",
                  "sample_rate": 41
                }
        argumentDocs:
            application_id: (String) RUM application ID.
            enabled: (Boolean) Whether the retention filter is to be enabled. Defaults to true.
            event_type: (String) The type of RUM events to filter on.
            id: (String) The ID of this resource.
            name: (String) The name of a RUM retention filter.
            query: (String) The Query string for a RUM retention filter. Defaults to "".
            sample_rate: (Number) The sample rate for a RUM retention filter, between 0.1 and 100. Supports one decimal place (for example, 50.5).
        importStatements:
            - terraform import datadog_rum_retention_filter.testing_rum_retention_filter "<application_id>:<retention_filter_id>"
    datadog_rum_retention_filters_order:
        subCategory: ""
        description: Provides a Datadog RumRetentionFiltersOrder resource. This is used to manage the order of Datadog RUM retention filters. Please note that retention_filter_ids should contain all IDs of retention filters, including the default ones created internally for a given RUM application.
        name: datadog_rum_retention_filters_order
        title: datadog_rum_retention_filters_order Resource - terraform-provider-datadog
        examples:
            - name: my_rum_retention_filters_order
              manifest: |-
                {
                  "application_id": "${resource.datadog_rum_application.my_rum_application.id}",
                  "retention_filter_ids": "${concat(\n    [for rf in data.datadog_rum_retention_filters.my_retention_filters.retention_filters :\n      rf.id if startswith(rf.id, \"default\")\n    ],\n    [datadog_rum_retention_filter.new_rum_retention_filter.id],\n    [for rf in data.datadog_rum_retention_filters.my_retention_filters.retention_filters :\n      rf.id if !startswith(rf.id, \"default\") \u0026\u0026 rf.id != datadog_rum_retention_filter.new_rum_retention_filter.id\n  ])}"
                }
              references:
                application_id: resource.datadog_rum_application.my_rum_application.id
              dependencies:
                datadog_rum_application.my_rum_application: |-
                    {
                      "name": "my-rum-application-test",
                      "type": "browser"
                    }
                datadog_rum_retention_filter.new_rum_retention_filter: |-
                    {
                      "application_id": "${resource.datadog_rum_application.my_rum_application.id}",
                      "enabled": true,
                      "event_type": "action",
                      "name": "testing.rum.retention_filter",
                      "query": "@session.has_replay:true",
                      "sample_rate": 60
                    }
        argumentDocs:
            application_id: (String) RUM application ID.
            id: (String) The ID of this resource.
            retention_filter_ids: (List of String) RUM retention filter ID list. The order of IDs in this attribute defines the order of RUM retention filters.
        importStatements:
            - terraform import datadog_rum_retention_filters_order.testing_rum_retention_filters_order "<application_id>"
    datadog_security_monitoring_critical_asset:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Critical Asset resource. It can be used to create and manage critical assets which modify the severity of a signal.
        name: datadog_security_monitoring_critical_asset
        title: datadog_security_monitoring_critical_asset Resource - terraform-provider-datadog
        examples:
            - name: my_critical_asset
              manifest: |-
                {
                  "enabled": true,
                  "query": "source:runtime-security-agent",
                  "rule_query": "type:(log_detection OR signal_correlation OR workload_security OR application_security) ruleId:007-d1a-1f3",
                  "severity": "increase",
                  "tags": [
                    "env:production",
                    "team:security"
                  ]
                }
        argumentDocs:
            enabled: (Boolean) Whether the critical asset is enabled. Defaults to true.
            id: (String) The ID of this resource.
            query: (String) The query used to match a critical asset and the associated signals. Uses the same syntax as the search bar in the Security Signals Explorer.
            rule_query: (String) The rule query to filter which detection rules this critical asset applies to. Uses the same syntax as the search bar for detection rules.
            severity: (String) The severity change applied to signals matching this critical asset. Valid values are critical, high, medium, low, info, increase, decrease.
            tags: (List of String) A list of tags associated with the critical asset.
        importStatements:
            - terraform import datadog_security_monitoring_critical_asset.my_critical_asset "1dab677c-5eb4-4ac8-b1d3-444bf0117e19"
    datadog_security_monitoring_default_rule:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Rule API resource for default rules. It can only be imported, you can't create a default rule.
        name: datadog_security_monitoring_default_rule
        title: datadog_security_monitoring_default_rule Resource - terraform-provider-datadog
        examples:
            - name: adefaultrule
              manifest: |-
                {
                  "case": [
                    {
                      "notifications": [
                        "@me"
                      ],
                      "status": "high"
                    }
                  ],
                  "enabled": true
                }
        argumentDocs:
            action: '(String) The type of filtering action. Allowed enum values: require, suppress Valid values are require, suppress.'
            agent_rule: (Block List, Deprecated) Deprecated. It won't be applied anymore. Deprecated. agent_rule has been deprecated in favor of new Agent Rule resource. (see below for nested schema)
            agent_rule_id: (String) Deprecated. It won't be applied anymore.
            aggregation: (String) The aggregation type. For Signal Correlation rules, it must be event_count. Valid values are count, cardinality, sum, max, new_value, geo_data, event_count, none.
            case: '(Block List, Max: 10) Cases of the rule, this is used to update notifications. (see below for nested schema)'
            custom_message: (String) Custom Message (will override default message) for generated signals.
            custom_name: (String) The name (will override default name) of the rule.
            custom_query_extension: (String) Query extension to append to the logs query.
            custom_status: (String) Status of the rule case to override. Valid values are info, low, medium, high, critical.
            custom_tags: (Set of String) Custom tags for generated signals.
            data_source: (String) Source of events. Valid values are logs, audit, app_sec_spans, spans, security_runtime, network, events.
            decrease_criticality_based_on_env: (Boolean) If true, signals in non-production environments have a lower severity than what is defined by the rule case, which can reduce noise. The decrement is applied when the environment tag of the signal starts with staging, test, or dev. Only available when the rule type is log_detection.
            distinct_fields: (List of String) Field for which the cardinality is measured. Sent as an array.
            enabled: (Boolean) Enable the rule. Defaults to true.
            expression: (String) Deprecated. It won't be applied anymore.
            filter: (Block List) Additional queries to filter matched events before they are processed. (see below for nested schema)
            group_by_fields: (List of String) Fields to group by.
            has_optional_group_by_fields: (Boolean) When false, events without a group-by value are ignored by the rule. When true, events with missing group-by fields are processed with N/A, replacing the missing values.
            id: (String) The ID of this resource.
            metric: (String, Deprecated) The target field to aggregate over when using the sum, max, or geo_data aggregations. Deprecated. Configure metrics instead. This attribute will be removed in the next major version of the provider.
            metrics: (List of String) Group of target fields to aggregate over when using the sum, max, geo_data, or new_value aggregations. The sum, max, and geo_data aggregations only accept one value in this list, whereas the new_value aggregation accepts up to five values.
            name: (String) Name of the query. Not compatible with new_value aggregations.
            notifications: (List of String) Notification targets for each rule case.
            options: '(Block List, Max: 1) Options on default rules. Note that only a subset of fields can be updated on default rule options. (see below for nested schema)'
            query: (Block List) Queries for selecting logs which are part of the rule. (see below for nested schema)
            status: (String) Status of the rule case to match. Valid values are info, low, medium, high, critical.
            type: (String) The rule type.
        importStatements:
            - |-
              # Default rules need to be imported using their ID before applying.
              resource "datadog_security_monitoring_default_rule" "adefaultrule" {
              }

              terraform import datadog_security_monitoring_default_rule.adefaultrule m0o-hto-lkb
    datadog_security_monitoring_filter:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Rule API resource for security filters.
        name: datadog_security_monitoring_filter
        title: datadog_security_monitoring_filter Resource - terraform-provider-datadog
        examples:
            - name: my_filter
              manifest: |-
                {
                  "exclusion_filter": [
                    {
                      "name": "first",
                      "query": "exclude some logs"
                    },
                    {
                      "name": "second",
                      "query": "exclude some other logs"
                    }
                  ],
                  "is_enabled": true,
                  "name": "My filter",
                  "query": "The filter is filtering."
                }
        argumentDocs:
            exclusion_filter: (Block List) Exclusion filters to exclude some logs from the security filter. (see below for nested schema)
            filtered_data_type: (String) The filtered data type. Valid values are logs. Defaults to "logs".
            id: (String) The ID of this resource.
            is_enabled: (Boolean) Whether the security filter is enabled.
            name: (String) The name of the security filter.
            query: (String) The query of the security filter.
            version: (Number) The version of the security filter.
        importStatements:
            - |-
              # Security monitoring filters can be imported using ID, e.g.
              terraform import datadog_security_monitoring_filter.my_filter m0o-hto-lkb
    datadog_security_monitoring_rule:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Rule API resource. This can be used to create and manage Datadog security monitoring rules. To change settings for a default rule, use datadog_security_monitoring_default_rule instead.
        name: datadog_security_monitoring_rule
        title: datadog_security_monitoring_rule Resource - terraform-provider-datadog
        examples:
            - name: myrule
              manifest: |-
                {
                  "case": [
                    {
                      "condition": "errors \u003e 3 \u0026\u0026 warnings \u003e 10",
                      "notifications": [
                        "@user"
                      ],
                      "status": "high"
                    }
                  ],
                  "enabled": true,
                  "message": "The rule has triggered.",
                  "name": "My rule",
                  "options": [
                    {
                      "evaluation_window": 300,
                      "keep_alive": 600,
                      "max_signal_duration": 900
                    }
                  ],
                  "query": [
                    {
                      "aggregation": "count",
                      "data_source": "logs",
                      "group_by_fields": [
                        "host"
                      ],
                      "name": "errors",
                      "query": "status:error"
                    },
                    {
                      "aggregation": "count",
                      "data_source": "logs",
                      "group_by_fields": [
                        "host"
                      ],
                      "name": "warnings",
                      "query": "status:warning"
                    }
                  ],
                  "tags": [
                    "type:dos"
                  ]
                }
        argumentDocs:
            action: (Block List) Action to perform when the case trigger (see below for nested schema)
            agent_rule: (Block List, Deprecated) Deprecated. It won't be applied anymore. Deprecated. agent_rule has been deprecated in favor of new Agent Rule resource. (see below for nested schema)
            agent_rule_id: (String) Deprecated. It won't be applied anymore.
            aggregation: (String) The aggregation type. For Signal Correlation rules, it must be event_count. Valid values are count, cardinality, sum, max, new_value, geo_data, event_count, none. Defaults to "count".
            anomaly_detection_options: '(Block List, Max: 1) Options for rules using the anomaly detection method. (see below for nested schema)'
            baseline_user_locations: (Boolean) If true, signals are suppressed for the first 24 hours. During that time, Datadog learns the user's regular access locations. This can be helpful to reduce noise and infer VPN usage or credentialed API access. Defaults to false.
            bucket_duration: (Number) Duration in seconds of the time buckets used to aggregate events matched by the rule. Valid values are 300, 600, 900, 1800, 3600, 10800. Valid values are 300, 600, 900, 1800, 3600, 10800.
            calculated_field: (Block List) One or more calculated fields. Available only for scheduled rules (in other words, when scheduling_options is defined). (see below for nested schema)
            case: '(Block List, Max: 10) Cases for generating signals. (see below for nested schema)'
            check_presence: (Boolean) Whether to include or exclude logs that match the reference table.
            child: (String) Child step name.
            column_name: (String) The name of the column in the reference table.
            condition: (String) A rule case contains logical operations (>,>=, &&, ||) to determine if a signal should be generated based on the event counts in the previously defined queries.
            correlated_by_fields: (List of String) Fields to correlate by.
            correlated_query_index: (String) Index of the rule query used to retrieve the correlated field. An empty string applies correlation on the non-projected per query attributes of the rule. Defaults to "".
            data_source: (String) Source of events. Valid values are logs, audit, app_sec_spans, spans, security_runtime, network, events. Defaults to "logs".
            decrease_criticality_based_on_env: (Boolean) If true, signals in non-production environments have a lower severity than what is defined by the rule case, which can reduce noise. The decrement is applied when the environment tag of the signal starts with staging, test, or dev. Only available when the rule type is log_detection. Defaults to false.
            default_notifications: (List of String) Notification targets for the default rule case, when none of the third-party cases match.
            default_rule_id: (String) Default Rule ID of the signal to correlate. This value is READ-ONLY.
            default_status: (String) Severity of the default rule case, when none of the third-party cases match. Valid values are info, low, medium, high, critical.
            detection_method: (String) The detection method. Valid values are threshold, new_value, anomaly_detection, impossible_travel, hardcoded, third_party, anomaly_threshold, sequence_detection. Defaults to "threshold".
            detection_tolerance: (Number) An optional parameter that sets how permissive anomaly detection is. Higher values require higher deviations before triggering a signal. Valid values are 1, 2, 3, 4, 5. Valid values are 1, 2, 3, 4, 5.
            distinct_fields: (List of String) Field for which the cardinality is measured. Sent as an array.
            duration: (Number) Duration of the action in seconds.
            enabled: (Boolean) Whether the rule is enabled. Defaults to true.
            evaluation_window: (Number) A time window is specified to match when at least one of the cases matches true. This is a sliding window and evaluates in real time. Valid values are 0, 60, 300, 600, 900, 1800, 3600, 7200, 10800, 21600, 43200, 86400.
            expression: (String) Expression.
            filter: '(Block List) Additional queries to filter matched events before they are processed. Note: This field is deprecated for log detection, signal correlation, and workload security rules. (see below for nested schema)'
            forget_after: (Number) The duration in days after which a learned value is forgotten. Valid values are 1, 2, 7, 14, 21, 28.
            group_by_fields: (List of String) Fields to group by. If empty, each log triggers a signal.
            group_signals_by: (List of String) Additional grouping to perform on top of the query grouping.
            has_extended_title: (Boolean) Whether the notifications include the triggering group-by values in their title. Defaults to false.
            has_optional_group_by_fields: (Boolean) When false, events without a group-by value are ignored by the rule. When true, events with missing group-by fields are processed with N/A, replacing the missing values. Defaults to false.
            id: (String) The ID of this resource.
            impossible_travel_options: '(Block List, Max: 1) Options for rules using the impossible travel detection method. (see below for nested schema)'
            indexes: (List of String) List of indexes to run the query on when the data source is logs. Supports only one element. Used only for scheduled rules (in other words, when scheduling_options is defined).
            instantaneous_baseline: (Boolean) When set to true, Datadog uses previous values that fall within the defined learning window to construct the baseline, enabling the system to establish an accurate baseline more rapidly rather than relying solely on gradual learning over time. Defaults to false.
            keep_alive: (Number) Once a signal is generated, the signal will remain “open” if a case is matched at least once within this keep alive window (in seconds). Valid values are 0, 60, 300, 600, 900, 1800, 3600, 7200, 10800, 21600, 43200, 86400.
            learning_duration: (Number) Learning duration in hours. Anomaly detection waits for at least this amount of historical data before it starts evaluating. Valid values are 1, 6, 12, 24, 48, 168, 336. Valid values are 1, 6, 12, 24, 48, 168, 336.
            learning_method: (String) The learning method used to determine when signals should be generated for values that weren't learned. Valid values are duration, threshold. Defaults to "duration".
            learning_period_baseline: (Number) An optional override baseline to apply while the rule is in the learning period. Must be greater than or equal to 0.
            learning_threshold: (Number) A number of occurrences after which signals are generated for values that weren't learned. Valid values are 0, 1. Defaults to 0.
            log_field_path: (String) The field in the log that should be matched against the reference table.
            max_signal_duration: (Number) A signal will “close” regardless of the query being matched once the time exceeds the maximum duration (in seconds). This time is calculated from the first seen timestamp. Valid values are 0, 60, 300, 600, 900, 1800, 3600, 7200, 10800, 21600, 43200, 86400.
            message: (String) Message for generated signals.
            metric: (String, Deprecated) The target field to aggregate over when using the sum, max, or geo_data aggregations. Deprecated. Configure metrics instead. This attribute will be removed in the next major version of the provider.
            metrics: (List of String) Group of target fields to aggregate over when using the sum, max, geo_data, or new_value aggregations. The sum, max, and geo_data aggregations only accept one value in this list, whereas the new_value aggregation accepts up to five values.
            name: (String) The name of the rule.
            new_value_options: '(Block List, Max: 1) New value rules specific options. (see below for nested schema)'
            notifications: (List of String) Notification targets for each rule case.
            options: '(Block List, Max: 1) Options on rules. (see below for nested schema)'
            parent: (String) Parent step name.
            query: (Block List) Queries for selecting logs which are part of the rule. (see below for nested schema)
            reference_tables: (Block List) Reference tables for filtering query results. (see below for nested schema)
            root_query: '(Block List, Min: 1, Max: 10) Queries to be combined with third-party case queries. Each of them can have different group by fields, to aggregate differently based on the type of alert. (see below for nested schema)'
            rrule: (String) Schedule for the rule queries, written in RRULE syntax. See RFC for syntax reference.
            rule_id: (String) Rule ID of the signal to correlate.
            rule_query_name: (String) The name of the query to filter.
            scheduling_options: '(Block List, Max: 1) Options for scheduled rules. When this field is present, the rule runs based on the schedule. When absent, it runs in real time on ingested logs. (see below for nested schema)'
            sequence_detection_options: '(Block List, Max: 1) Options for rules using the sequence detection method. (see below for nested schema)'
            signal_query: (Block List) Queries for selecting logs which are part of the rule. (see below for nested schema)
            signal_title_template: (String) A template for the signal title; if omitted, the title is generated based on the case name.
            start: (String) Start date for the schedule, in ISO 8601 format without timezone.
            status: (String) Severity of the Security Signal. Valid values are info, low, medium, high, critical.
            step_transitions: (Block List) Edges of the step graph. (see below for nested schema)
            steps: (Block List) Sequence steps. (see below for nested schema)
            table_name: (String) The name of the reference table.
            tags: '(Set of String) Tags for generated signals. Note: if default tags are present at provider level, they will be added to this resource.'
            third_party_case: '(Block List, Max: 10) Cases for generating signals for third-party rules. Only required and accepted for third-party rules (see below for nested schema)'
            third_party_rule_options: '(Block List, Max: 1) Options for rules using the third-party detection method. (see below for nested schema)'
            timezone: (String) Time zone of the start date, in the tz database format.
            type: (String) The rule type. Valid values are application_security, log_detection, workload_security, signal_correlation. Defaults to "log_detection".
            validate: (Boolean) Whether or not to validate the Rule.
        importStatements:
            - |-
              # Security monitoring rules can be imported using ID, e.g.
              terraform import datadog_security_monitoring_rule.my_rule m0o-hto-lkb
    datadog_security_monitoring_rule_json:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Rule JSON resource. This can be used to create and manage Datadog security monitoring rules using raw JSON.
        name: datadog_security_monitoring_rule_json
        title: datadog_security_monitoring_rule_json Resource - terraform-provider-datadog
        examples:
            - name: security_rule_json
              manifest: |-
                {
                  "rule": "{\n  \"name\": \"High error rate security monitoring\",\n  \"isEnabled\": true,\n  \"type\": \"log_detection\",\n  \"message\": \"High error rate detected in logs\",\n  \"tags\": [\"env:prod\", \"security\"],\n  \"cases\": [\n    {\n      \"name\": \"high case\",\n      \"status\": \"high\",\n      \"condition\": \"errors \u003e 100 \u0026\u0026 warnings \u003e 1000\",\n      \"notifications\": [\"@security-team\"]\n    }\n  ],\n  \"queries\": [\n    {\n      \"name\": \"errors\",\n      \"query\": \"status:error\",\n      \"aggregation\": \"count\",\n      \"dataSource\": \"logs\",\n      \"groupByFields\": [\"service\", \"env\"]\n    },\n    {\n      \"name\": \"warnings\",\n      \"query\": \"status:warning\",\n      \"aggregation\": \"count\",\n      \"dataSource\": \"logs\",\n      \"groupByFields\": [\"service\", \"env\"]\n    }\n  ],\n  \"options\": {\n    \"evaluationWindow\": 300,\n    \"keepAlive\": 600,\n    \"maxSignalDuration\": 900,\n    \"detectionMethod\": \"threshold\"\n  }\n}\n"
                }
        argumentDocs:
            id: (String) The ID of this resource.
            json: (String) The JSON definition of the Security Monitoring Rule.
        importStatements:
            - terraform import datadog_security_monitoring_rule_json.security_rule_json aaa-yyy-vvv
    datadog_security_monitoring_suppression:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Suppression API resource. It can be used to create and manage Datadog security monitoring suppression rules.
        name: datadog_security_monitoring_suppression
        title: datadog_security_monitoring_suppression Resource - terraform-provider-datadog
        examples:
            - name: my_suppression
              manifest: |-
                {
                  "data_exclusion_query": "env:test",
                  "description": "Suppression for low severity CloudTrail signals from John Doe, excluding test environments from analysis, limited to 2024",
                  "enabled": true,
                  "expiration_date": "2024-12-31T12:00:00Z",
                  "name": "My suppression",
                  "rule_query": "severity:low source:cloudtrail",
                  "start_date": "2024-12-01T16:00:00Z",
                  "suppression_query": "@usr.id:john.doe"
                }
        argumentDocs:
            data_exclusion_query: (String) An exclusion query on the input data of the security rules, which could be logs, Agent events, or other types of data based on the security rule. Events matching this query are ignored by any detection rules referenced in the suppression rule.
            description: (String) A description for the suppression rule.
            enabled: (Boolean) Whether the suppression rule is enabled.
            expiration_date: (String) A RFC3339 timestamp giving an expiration date for the suppression rule. After this date, it won't suppress signals anymore.
            id: (String) The ID of this resource.
            name: (String) The name of the suppression rule.
            rule_query: (String) The rule query of the suppression rule, with the same syntax as the search bar for detection rules.
            start_date: (String) A RFC3339 timestamp giving a start date for the suppression rule. Before this date, it doesn't suppress signals.
            suppression_query: (String) The suppression query of the suppression rule. If a signal matches this query, it is suppressed and is not triggered. It uses the same syntax as the queries to search signals in the Signals Explorer.
            tags: (List of String) A list of tags associated with the suppression rule.
            validate: (Boolean) Whether to validate the suppression rule during terraform plan. When set to true, the rule is validated against Datadog's suppression validation endpoint. Defaults to true.
        importStatements:
            - |-
              # Security monitoring suppressions can be imported using ID, for example:
              terraform import datadog_security_monitoring_suppression.my_suppression m0o-hto-lkb
    datadog_security_notification_rule:
        subCategory: ""
        description: Provides a Datadog Security Monitoring Notification Rule API resource for creating and managing Datadog security notification rules.
        name: datadog_security_notification_rule
        title: datadog_security_notification_rule Resource - terraform-provider-datadog
        examples:
            - name: signal_rule
              manifest: |-
                {
                  "enabled": false,
                  "name": "My signal notification rule",
                  "selectors": [
                    {
                      "query": "env:prod",
                      "rule_types": [
                        "workload_security"
                      ],
                      "trigger_source": "security_signals"
                    }
                  ],
                  "targets": [
                    "@bob@email.com",
                    "@alice@email.com"
                  ]
                }
            - name: vulnerability_rule
              manifest: |-
                {
                  "name": "My vulnerability notification rule",
                  "selectors": [
                    {
                      "rule_types": [
                        "application_library_vulnerability",
                        "identity_risk"
                      ],
                      "severities": [
                        "critical",
                        "high"
                      ],
                      "trigger_source": "security_findings"
                    }
                  ],
                  "targets": [
                    "@john@email.com"
                  ],
                  "time_aggregation": 36000
                }
        argumentDocs:
            created_at: (Number) Indicates when this rule was created.
            created_by_handle: (String) The handle of the rule creator.
            created_by_name: (String) The name of the rule creator.
            enabled: (Boolean) Indicates whether the rule is enabled. Defaults to true.
            id: (String) The ID of this resource.
            modified_at: (Number) Indicates when this rule was last modified.
            modified_by_handle: (String) The handle of the rule last modifier.
            modified_by_name: (String) The name of the rule last modifier.
            name: (String) The name of the rule (must be unique).
            query: (String) Comprises one or several key:value pairs for filtering security issues based on tags and attributes. Defaults to "".
            rule_types: (Set of String) Specifies security rule types for filtering signals and vulnerabilities that generate notifications.
            selectors: (Block, Optional) Defines selectors to filter security issues that generate notifications. (see below for nested schema)
            severities: (Set of String) The security rules severities to consider.
            targets: (Set of String) The list of handle targets for the notifications. A target must be prefixed with an @. It can be an email address (@bob@email.com), or any installed integration. For example, a Slack recipient (@slack-ops), or a Teams recipient (@teams-ops).
            time_aggregation: (Number) Specifies the time period, in seconds, used to aggregate the notification. Defaults to 0.
            trigger_source: (String) The type of security issues the rule applies to. Use security_signals for rules based on security signals and security_findings for those based on vulnerabilities.
            version: (Number) The rule version (incremented at each update).
        importStatements:
            - terraform import datadog_security_notification_rule.signal_rule yq9-t9l-bso
    datadog_sensitive_data_scanner_group:
        subCategory: ""
        description: Provides a Sensitive Data Scanner group resource.
        name: datadog_sensitive_data_scanner_group
        title: datadog_sensitive_data_scanner_group Resource - terraform-provider-datadog
        examples:
            - name: mygroup
              manifest: |-
                {
                  "description": "A relevant description",
                  "filter": [
                    {
                      "query": "service:my-service"
                    }
                  ],
                  "is_enabled": true,
                  "name": "My new scanning group",
                  "product_list": [
                    "apm",
                    "logs"
                  ],
                  "samplings": [
                    {
                      "product": "apm",
                      "rate": 100
                    },
                    {
                      "product": "logs",
                      "rate": 10
                    }
                  ]
                }
        argumentDocs:
            description: (String) Description of the Datadog scanning group.
            filter: '(Block List, Min: 1, Max: 1) Filter object the scanning group applies. (see below for nested schema)'
            id: (String) The ID of this resource.
            is_enabled: (Boolean) Whether or not the scanning group is enabled. If the group doesn't contain any rule or if all the rules in it are disabled, the group is force-disabled by our backend
            name: (String) Name of the Datadog scanning group.
            product: (String) Product that the sampling rate applies to. Valid values are logs, rum, events, apm.
            product_list: (Set of String) List of products the scanning group applies. Valid values are logs, rum, events, apm.
            query: (String) Query to filter the events.
            rate: (Number) Percentage rate at which data for the product type is scanned.
            samplings: '(Block List, Max: 4) List of sampling configurations per product type for the scanning group. (see below for nested schema)'
        importStatements:
            - terraform import datadog_sensitive_data_scanner_group.new_list "<group_id>"
    datadog_sensitive_data_scanner_group_order:
        subCategory: ""
        description: Provides a Datadog Sensitive Data Scanner Group Order API resource. This can be used to manage the order of Datadog Sensitive Data Scanner Groups.
        name: datadog_sensitive_data_scanner_group_order
        title: datadog_sensitive_data_scanner_group_order Resource - terraform-provider-datadog
        examples:
            - name: mygrouporder
              manifest: |-
                {
                  "group_ids": [
                    "group-id-1",
                    "group-id-2",
                    "group-id-3"
                  ]
                }
        argumentDocs:
            group_ids: (List of String) The list of Sensitive Data Scanner group IDs, in order. Logs are tested against the query filter of each index one by one following the order of the list.
            id: (String) The ID of this resource.
        importStatements:
            - terraform import datadog_sensitive_data_scanner_group_order.mygrouporder order
    datadog_sensitive_data_scanner_rule:
        subCategory: ""
        description: Provides a Datadog SensitiveDataScannerRule resource. This can be used to create and manage Datadog sensitive_data_scanner_rule. Setting the create_before_destroy lifecycle Meta-argument to true is highly recommended if modifying the included_keyword_configuration field to avoid unexpectedly disabling Sensitive Data Scanner groups.
        name: datadog_sensitive_data_scanner_rule
        title: datadog_sensitive_data_scanner_rule Resource - terraform-provider-datadog
        examples:
            - name: myrule
              manifest: |-
                {
                  "description": "Another description",
                  "excluded_namespaces": [
                    "username"
                  ],
                  "group_id": "${datadog_sensitive_data_scanner_group.mygroup.id}",
                  "included_keyword_configuration": [
                    {
                      "character_count": 30,
                      "keywords": [
                        "cc",
                        "credit card"
                      ]
                    }
                  ],
                  "is_enabled": true,
                  "lifecycle": [
                    {
                      "create_before_destroy": true
                    }
                  ],
                  "name": "My new rule",
                  "pattern": "myregex",
                  "priority": 1,
                  "tags": [
                    "sensitive_data:true"
                  ],
                  "text_replacement": [
                    {
                      "number_of_chars": 0,
                      "replacement_string": "",
                      "type": "hash"
                    }
                  ]
                }
              references:
                group_id: datadog_sensitive_data_scanner_group.mygroup.id
              dependencies:
                datadog_sensitive_data_scanner_group.mygroup: |-
                    {
                      "description": "A relevant description",
                      "filter": [
                        {
                          "query": "service:my-service"
                        }
                      ],
                      "is_enabled": true,
                      "name": "My new scanning group",
                      "product_list": [
                        "apm"
                      ]
                    }
            - name: mylibraryrule_with_custom_included_keywords
              manifest: |-
                {
                  "description": "A description",
                  "excluded_namespaces": [
                    "username"
                  ],
                  "group_id": "${datadog_sensitive_data_scanner_group.mygroup.id}",
                  "included_keyword_configuration": [
                    {
                      "character_count": 30,
                      "keywords": [
                        "cc",
                        "credit card"
                      ]
                    }
                  ],
                  "is_enabled": true,
                  "name": "My library rule",
                  "standard_pattern_id": "${data.datadog_sensitive_data_scanner_standard_pattern.aws_sp.id}",
                  "tags": [
                    "sensitive_data:true"
                  ]
                }
              references:
                group_id: datadog_sensitive_data_scanner_group.mygroup.id
                standard_pattern_id: data.datadog_sensitive_data_scanner_standard_pattern.aws_sp.id
              dependencies:
                datadog_sensitive_data_scanner_group.mygroup: |-
                    {
                      "description": "A relevant description",
                      "filter": [
                        {
                          "query": "service:my-service"
                        }
                      ],
                      "is_enabled": true,
                      "name": "My new scanning group",
                      "product_list": [
                        "apm"
                      ]
                    }
            - name: mylibraryrule_with_recommended_keywords
              manifest: |-
                {
                  "description": "A description",
                  "excluded_namespaces": [
                    "username"
                  ],
                  "group_id": "${datadog_sensitive_data_scanner_group.mygroup.id}",
                  "is_enabled": true,
                  "name": "My library rule",
                  "standard_pattern_id": "${data.datadog_sensitive_data_scanner_standard_pattern.aws_sp.id}",
                  "tags": [
                    "sensitive_data:true"
                  ]
                }
              references:
                group_id: datadog_sensitive_data_scanner_group.mygroup.id
                standard_pattern_id: data.datadog_sensitive_data_scanner_standard_pattern.aws_sp.id
              dependencies:
                datadog_sensitive_data_scanner_group.mygroup: |-
                    {
                      "description": "A relevant description",
                      "filter": [
                        {
                          "query": "service:my-service"
                        }
                      ],
                      "is_enabled": true,
                      "name": "My new scanning group",
                      "product_list": [
                        "apm"
                      ]
                    }
        argumentDocs:
            character_count: (Number) Number of characters before the match to find a keyword validating the match. It must be between 1 and 50 (inclusive).
            description: (String) Description of the rule.
            excluded_namespaces: (List of String) Attributes excluded from the scan. If namespaces is provided, it has to be a sub-path of the namespaces array.
            group_id: (String) Id of the scanning group the rule belongs to.
            id: (String) The ID of this resource.
            included_keyword_configuration: '(Block List, Max: 1) Object defining a set of keywords and a number of characters that help reduce noise. You can provide a list of keywords you would like to check within a defined proximity of the matching pattern. If any of the keywords are found within the proximity check then the match is kept. If none are found, the match is discarded. If the rule has the standard_pattern_id field, then discarding this field will apply the recommended keywords. Setting the create_before_destroy lifecycle Meta-argument to true is highly recommended if modifying this field to avoid unexpectedly disabling Sensitive Data Scanner groups. (see below for nested schema)'
            is_enabled: (Boolean) Whether or not the rule is enabled.
            keywords: (List of String) Keyword list that is checked during scanning in order to validate a match. The number of keywords in the list must be lower than or equal to 30.
            name: (String) Name of the rule.
            namespaces: (List of String) Attributes included in the scan. If namespaces is empty or missing, all attributes except excluded_namespaces are scanned. If both are missing the whole event is scanned.
            number_of_chars: (Number) Required if type == 'partial_replacement_from_beginning' or 'partial_replacement_from_end'. It must be > 0.
            pattern: (String) Not included if there is a relationship to a standard pattern.
            priority: (Number) Priority level of the rule (optional). Used to order sensitive data discovered in the sds summary page. It must be between 1 and 5 (1 being the most important).
            replacement_string: (String) Required if type == 'replacement_string'.
            should_save_match: (Boolean) Only valid when type == replacement_string. When enabled, matches can be unmasked in logs by users with ‘Data Scanner Unmask’ permission. As a security best practice, avoid masking for highly-sensitive, long-lived data.
            standard_pattern_id: (String) Id of the standard pattern the rule refers to. If provided, then pattern must not be provided.
            tags: (List of String) List of tags.
            text_replacement: '(Block List, Max: 1) Object describing how the scanned event will be replaced. Defaults to type: none (see below for nested schema)'
            type: (String) Type of the replacement text. None means no replacement. hash means the data will be stubbed. replacement_string means that one can chose a text to replace the data. partial_replacement_from_beginning allows a user to partially replace the data from the beginning, and partial_replacement_from_end on the other hand, allows to replace data from the end. Valid values are none, hash, replacement_string, partial_replacement_from_beginning, partial_replacement_from_end.
        importStatements:
            - terraform import datadog_sensitive_data_scanner_rule.new_list "<rule_id>"
