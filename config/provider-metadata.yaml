    datadog_on_call_escalation_policy:
        subCategory: ""
        description: Provides a Datadog On-Call escalation policy resource. This can be used to create and manage Datadog On-Call escalation policies.
        name: datadog_on_call_escalation_policy
        title: datadog_on_call_escalation_policy Resource - terraform-provider-datadog
        examples:
            - name: policy_test
              manifest: |-
                {
                  "name": "Policy Name",
                  "resolve_page_on_policy_end": true,
                  "retries": 3,
                  "step": [
                    {
                      "assignment": "round-robin",
                      "escalate_after_seconds": 300,
                      "target": [
                        {
                          "team": "00000000-aba2-0000-0000-000000000000"
                        },
                        {
                          "user": "00000000-aba2-0000-0000-000000000000"
                        },
                        {
                          "schedule": "00000000-aba2-0000-0000-000000000000"
                        }
                      ]
                    }
                  ]
                }
        argumentDocs:
            assignment: (String) Specifies how this escalation step will assign targets. Can be default (page all targets at once) or round-robin. Valid values are default, round-robin. Defaults to "default".
            escalate_after_seconds: (Number) Defines how many seconds to wait before escalating to the next step. Value must be between 60 and 36000.
            id: (String) The ID of this resource.
            name: (String) A human-readable name for the escalation policy.
            position: '(String) For schedule targets, specifies which on-call user to page. Valid values: current (default), previous, next. Valid values are current, previous, next.'
            resolve_page_on_policy_end: (Boolean) If true, pages will be automatically resolved if unacknowledged after the final step. Defaults to false.
            retries: (Number) If set, policy will be retried this many times after the final step. Must be in the range 0-10. Value must be between 0 and 10. Defaults to 0.
            schedule: (String) Targeted schedule ID.
            step: (Block List) List of steps for the escalation policy. (see below for nested schema)
            target: (Block List) List of targets for the step. (see below for nested schema)
            team: (String) Targeted team ID.
            teams: (List of String) A list of team ids associated with the escalation policy.
            user: (String) Targeted user ID.
        importStatements:
            - |-
              # Import an existing on_call_escalation_policy
              terraform import datadog_on_call_escalation_policy.policy_test "b03a07d5-49da-43e9-83b4-5d84969b588b"
    datadog_on_call_schedule:
        subCategory: ""
        description: Provides a Datadog On-Call schedule resource. This can be used to create and manage Datadog On-Call schedules.
        name: datadog_on_call_schedule
        title: datadog_on_call_schedule Resource - terraform-provider-datadog
        examples:
            - name: test
              manifest: |-
                {
                  "layer": [
                    {
                      "effective_date": "2025-01-01T00:00:00Z",
                      "end_date": "2026-01-01T00:00:00Z",
                      "interval": [
                        {
                          "days": 1,
                          "seconds": 300
                        }
                      ],
                      "name": "Primary On-Call Layer",
                      "restriction": [
                        {
                          "end_day": "monday",
                          "end_time": "17:00:00",
                          "start_day": "monday",
                          "start_time": "09:00:00"
                        }
                      ],
                      "rotation_start": "2025-01-01T00:00:00Z",
                      "users": [
                        "00000000-aba1-0000-0000-000000000000"
                      ]
                    },
                    {
                      "effective_date": "2025-01-01T00:00:00Z",
                      "interval": [
                        {
                          "days": 7
                        }
                      ],
                      "name": "Asia-Pacific On-Call Layer",
                      "rotation_start": "2025-01-01T00:00:00Z",
                      "time_zone": "Asia/Tokyo",
                      "users": [
                        "00000000-aba1-0000-0000-000000000001"
                      ]
                    }
                  ],
                  "name": "Team A On-Call",
                  "teams": [
                    "00000000-aba2-0000-0000-000000000000"
                  ],
                  "time_zone": "America/New_York"
                }
        argumentDocs:
            days: (Number) The number of full days in each rotation period.
            effective_date: (String) The date/time when this layer should become active (in ISO 8601).
            end_date: (String) The date/time after which this layer no longer applies (in ISO 8601).
            end_day: (String) The weekday when the restriction period ends. Valid values are monday, tuesday, wednesday, thursday, friday, saturday, sunday.
            end_time: (String) The time of day when the restriction ends (hh:mm:ss).
            id: (String) The ID of this resource.
            interval: (Block List) Rotation interval for this layer. (see below for nested schema)
            layer: (Block List) List of layers for the schedule. (see below for nested schema)
            name: (String) A human-readable name for the new schedule.
            restriction: (Block List) List of restrictions for the layer. (see below for nested schema)
            rotation_start: (String) The date/time when the rotation for this layer starts (in ISO 8601).
            seconds: (Number) For intervals that are not expressible in whole days, this will be added to days. Defaults to 0.
            start_day: (String) The weekday when the restriction period starts. Valid values are monday, tuesday, wednesday, thursday, friday, saturday, sunday.
            start_time: (String) The time of day when the restriction begins (hh:mm:ss).
            teams: (List of String) A list of team ids associated with the schedule.
            time_zone: (String) The time zone in which the schedule is defined.
            users: (List of String) List of user IDs for the layer. Can either be a valid user id or null to represent No-one.
        importStatements:
            - |-
              # Import an existing on_call_schedule
              terraform import datadog_on_call_schedule.test "b03a07d5-49da-43e9-83b4-5d84969b588b"
    datadog_on_call_team_routing_rules:
